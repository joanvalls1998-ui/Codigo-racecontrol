<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #060606;
            --panel: #121212;
            --text: #f5f5f5;
            --muted: #a0a0a0;
            --accent: #e10600;
            --accent-soft: #ff3b30;
            --line: #262626;
            --green-soft: #8de1b1;
            --warning: #f59e0b;
            --blue-soft: #93c5fd;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 35%, #060606 100%);
            color: var(--text);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
            padding: 18px 20px 16px;
            border-bottom: 1px solid rgba(225, 6, 0, 0.35);
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .container {
            padding: 18px 16px 110px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(28,28,28,0.96) 0%, rgba(18,18,18,0.96) 100%);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 18px;
            box-shadow:
                0 10px 24px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--accent-soft);
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .card p {
            margin: 6px 0;
            color: var(--text);
            line-height: 1.45;
            font-size: 15px;
        }

        .small {
            font-size: 13px;
            color: var(--muted);
        }

        .highlight {
            color: white;
            font-weight: 700;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 4px;
            padding: 12px 8px calc(14px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(225, 6, 0, 0.35);
            box-shadow: 0 -8px 20px rgba(0,0,0,0.25);
            overflow-x: auto;
        }

        .nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            padding: 8px 8px;
            border-radius: 10px;
            transition: 0.2s ease;
            min-width: 52px;
            text-align: center;
            white-space: nowrap;
        }

        .nav a.active {
            color: white;
            background: rgba(255,255,255,0.07);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        th {
            color: var(--accent-soft);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(225, 6, 0, 0.12);
            color: #ff8a84;
            border: 1px solid rgba(225, 6, 0, 0.2);
        }

        .pill-green {
            background: rgba(15, 157, 88, 0.12);
            color: var(--green-soft);
            border: 1px solid rgba(15, 157, 88, 0.25);
        }

        .pill-blue {
            background: rgba(59, 130, 246, 0.12);
            color: var(--blue-soft);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .section-title {
            margin: 4px 0 12px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .sim-grid {
            display: grid;
            gap: 10px;
        }

        .sim-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        .sim-line:last-child {
            border-bottom: none;
        }

        .status-good { color: var(--green-soft); font-weight: 700; }
        .status-mid { color: #ffd166; font-weight: 700; }
        .status-bad { color: #ff8a84; font-weight: 700; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 800;
        }

        .news-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-source {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .bar-wrap {
            margin-top: 10px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .bar {
            width: 100%;
            height: 8px;
            background: #1e1e1e;
            border-radius: 999px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
        }

        .bar-red { background: linear-gradient(90deg, #991b1b, #ef4444); }
        .bar-green { background: linear-gradient(90deg, #166534, #22c55e); }
        .bar-yellow { background: linear-gradient(90deg, #92400e, #f59e0b); }
        .bar-blue { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #e10600, #ff3b30);
            color: white;
            font-size: 15px;
            font-weight: 800;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="header">

    <div class="subtitle">Fórmula 1 · Datos · Simulación · Noticias · Aston Martin</div>

function setActiveNav(tabId) {
    const ids = ["nav-home", "nav-standings", "nav-calendar", "nav-sim", "nav-predict", "nav-aston", "nav-news"];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
    });
    const active = document.getElementById(tabId);
    if (active) active.classList.add("active");
}

function generateSimulation() {
    const teams = [
        { name: "Mercedes", pace: 100 },
        { name: "Ferrari", pace: 98 },
        { name: "McLaren", pace: 96 },
        { name: "Red Bull", pace: 95 },
        { name: "Haas", pace: 92 },
        { name: "Alpine", pace: 91 },
        { name: "Racing Bulls", pace: 90 },
        { name: "Williams", pace: 89 },
        { name: "Audi", pace: 88 },
        { name: "Aston Martin", pace: 86 },
        { name: "Cadillac", pace: 85 }
    ];

    let rainPercent = Math.floor(15 + Math.random() * 26);
    let scPercent = Math.floor(25 + Math.random() * 26);
    let alonsoPointsProb = Math.floor(10 + Math.random() * 23);
    let alonsoDnfProb = Math.floor(20 + Math.random() * 21);
    let alonsoQualy = Math.floor(12 + Math.random() * 4);
    let alonsoRace = Math.max(11, alonsoQualy - Math.floor(Math.random() * 2));
    let strollRace = Math.min(18, alonsoRace + 2 + Math.floor(Math.random() * 2));

    let top10 = [
        "Antonelli",
        "Russell",
        "Leclerc",
        "Hamilton",
        "Norris",
        "Piastri",
        "Verstappen",
        "Gasly",
        "Bearman",
        "Lawson"
    ];

    if (Math.random() < 0.35) {
        top10[7] = "Alonso";
        alonsoRace = 10;
        alonsoPointsProb = 34;
    }

    return { teams, rainPercent, scPercent, alonsoPointsProb, alonsoDnfProb, alonsoQualy, alonsoRace, strollRace, top10 };
}

function showSim() {

        </div>

        <div class="card">

            ${sim.teams.map(team => `

                    </div>

        </div>

        <div class="card">
            <h3>Predicción Top 10</h3>
            <div class="sim-grid">
                ${sim.top10.map((driver, index) => `
                    <div class="sim-line"><span>${index + 1}</span><span>${driver}</span></div>
                `).join("")}
            </div>
        </div>

            <p><span class="highlight">Qualy estimada:</span> P${sim.alonsoQualy}</p>

            <p><span class="highlight">Probabilidad de DNF:</span> ${Math.min(55, sim.alonsoDnfProb + 5)}%</p>
        </div>
    `;
}
