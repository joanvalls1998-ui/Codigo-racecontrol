<!DOCTYPE html>
<html>
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0b0b;
            color: white;
        }

        .header {
            background-color: #111;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid red;
        }

        .container {
            padding: 20px;
            padding-bottom: 90px;
        }

        .card {
            background-color: #1a1a1a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        .card h3 {
            margin-top: 0;
            color: #ff4747;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #111;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid red;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: red;
        }
    </style>
</head>

<body>

<div class="header">
    RaceControl
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" onclick="showHome(); return false;">Home</a>
    <a href="#" onclick="showStandings(); return false;">Standings</a>
    <a href="#" onclick="showCalendar(); return false;">Calendar</a>
    <a href="#" onclick="showSim(); return false;">Sim</a>
</div>

<script>
function showHome() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Última carrera</h3>
            <p>Japanese Grand Prix</p>
            <p>Ganador: Kimi Antonelli</p>
        </div>

        <div class="card">
            <h3>Próxima carrera</h3>
            <p>Miami Grand Prix</p>
        </div>

        <div class="card">
            <h3>Noticias</h3>
            <p>Mercedes domina el inicio de temporada 2026.</p>
            <p>Aston Martin sigue con problemas de fiabilidad.</p>
        </div>
    `;
}

function showStandings() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Drivers Standings</h3>
            <table>
                <tr><th>Pos</th><th>Piloto</th><th>Equipo</th><th>Puntos</th></tr>
                <tr><td>1</td><td>Kimi Antonelli</td><td>Mercedes</td><td>72</td></tr>
                <tr><td>2</td><td>George Russell</td><td>Mercedes</td><td>63</td></tr>
                <tr><td>3</td><td>Charles Leclerc</td><td>Ferrari</td><td>49</td></tr>
                <tr><td>4</td><td>Lewis Hamilton</td><td>Ferrari</td><td>41</td></tr>
                <tr><td>5</td><td>Lando Norris</td><td>McLaren</td><td>25</td></tr>
                <tr><td>6</td><td>Oscar Piastri</td><td>McLaren</td><td>21</td></tr>
                <tr><td>7</td><td>Oliver Bearman</td><td>Haas</td><td>17</td></tr>
                <tr><td>8</td><td>Pierre Gasly</td><td>Alpine</td><td>15</td></tr>
                <tr><td>9</td><td>Max Verstappen</td><td>Red Bull</td><td>12</td></tr>
                <tr><td>10</td><td>Liam Lawson</td><td>Racing Bulls</td><td>10</td></tr>
                <tr><td>11</td><td>Arvid Lindblad</td><td>Racing Bulls</td><td>4</td></tr>
                <tr><td>12</td><td>Isack Hadjar</td><td>Red Bull</td><td>4</td></tr>
                <tr><td>13</td><td>Gabriel Bortoleto</td><td>Audi</td><td>2</td></tr>
                <tr><td>14</td><td>Carlos Sainz</td><td>Williams</td><td>2</td></tr>
                <tr><td>15</td><td>Esteban Ocon</td><td>Haas</td><td>1</td></tr>
                <tr><td>16</td><td>Franco Colapinto</td><td>Alpine</td><td>1</td></tr>
                <tr><td>17</td><td>Nico Hülkenberg</td><td>Audi</td><td>0</td></tr>
                <tr><td>18</td><td>Alexander Albon</td><td>Williams</td><td>0</td></tr>
                <tr><td>19</td><td>Valtteri Bottas</td><td>Cadillac</td><td>0</td></tr>
                <tr><td>20</td><td>Sergio Pérez</td><td>Cadillac</td><td>0</td></tr>
                <tr><td>21</td><td>Lance Stroll</td><td>Aston Martin</td><td>0</td></tr>
                <tr><td>22</td><td>Fernando Alonso</td><td>Aston Martin</td><td>0</td></tr>
            </table>
        </div>
    `;
}

function showCalendar() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Calendario</h3>
            <p>Australia — Completado</p>
            <p>China — Completado</p>
            <p>Japón — Completado</p>
            <p>Miami — Próximo</p>
            <p>Canadá — Próximo</p>
            <p>Mónaco — Próximo</p>
        </div>
    `;
}
function showSim() {

    let drivers = [
        {name:"Antonelli", team:"Mercedes", pace:1.0},
        {name:"Russell", team:"Mercedes", pace:1.0},
        {name:"Leclerc", team:"Ferrari", pace:1.05},
        {name:"Hamilton", team:"Ferrari", pace:1.05},
        {name:"Norris", team:"McLaren", pace:1.07},
        {name:"Piastri", team:"McLaren", pace:1.07},
        {name:"Verstappen", team:"Red Bull", pace:1.08},
        {name:"Hadjar", team:"Red Bull", pace:1.08},
        {name:"Gasly", team:"Alpine", pace:1.10},
        {name:"Colapinto", team:"Alpine", pace:1.10},
        {name:"Bearman", team:"Haas", pace:1.11},
        {name:"Ocon", team:"Haas", pace:1.11},
        {name:"Albon", team:"Williams", pace:1.12},
        {name:"Sainz", team:"Williams", pace:1.12},
        {name:"Bortoleto", team:"Audi", pace:1.13},
        {name:"Hulkenberg", team:"Audi", pace:1.13},
        {name:"Lawson", team:"Racing Bulls", pace:1.11},
        {name:"Lindblad", team:"Racing Bulls", pace:1.11},
        {name:"Perez", team:"Cadillac", pace:1.14},
        {name:"Bottas", team:"Cadillac", pace:1.14},
        {name:"Alonso", team:"Aston Martin", pace:1.12},
        {name:"Stroll", team:"Aston Martin", pace:1.12}
    ];

    // Añadir variación
    drivers.forEach(d => {
        d.random = Math.random() * 0.06;
        d.total = d.pace + d.random;
    });

    // Ordenar por ritmo
    drivers.sort((a,b) => a.total - b.total);

    // Safety car
    let safetyCar = Math.random() < 0.4 ? "Sí" : "No";

    // Lluvia
    let rain = Math.random() < 0.3 ? "Sí" : "No";

    // DNF
    let dnf = Math.random() < 0.25 ? "Sí" : "No";

    // Posición Alonso
    let alonsoPos = drivers.findIndex(d => d.name === "Alonso") + 1;

    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Simulación de Carrera</h3>
            <p>Circuito: Suzuka</p>
            <p>Lluvia: ${rain}</p>
            <p>Safety Car: ${safetyCar}</p>
            <p>DNF: ${dnf}</p>
        </div>

        <div class="card">
            <h3>Top 10</h3>
            <p>1. ${drivers[0].name}</p>
            <p>2. ${drivers[1].name}</p>
            <p>3. ${drivers[2].name}</p>
            <p>4. ${drivers[3].name}</p>
            <p>5. ${drivers[4].name}</p>
            <p>6. ${drivers[5].name}</p>
            <p>7. ${drivers[6].name}</p>
            <p>8. ${drivers[7].name}</p>
            <p>9. ${drivers[8].name}</p>
            <p>10. ${drivers[9].name}</p>
        </div>

        <div class="card">
            <h3>Fernando Alonso</h3>
            <p>Posición: P${alonsoPos}</p>
            <p>Estrategia: Medium → Hard</p>
            <p>Pit Stop: Vuelta 17</p>
            <p>Ritmo: +${(drivers[alonsoPos-1].total - drivers[0].total).toFixed(2)}s</p>
        </div>
    `;
}


showHome();
</script>

</body>
</html>
