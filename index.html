<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>

:root {
    --bg: #060606;
    --panel: #121212;
    --text: #f5f5f5;
    --muted: #9a9a9a;
    --line: #262626;

    --aston: #00d2be;
    --mercedes: #00aaff;
    --ferrari: #ff3b30;
    --mclaren: #ff8700;
    --redbull: #1e3a8a;
    --alpine: #4cc9f0;
    --williams: #3a86ff;
    --audi: #aaaaaa;
    --cadillac: #c6a300;
    --haas: #ffffff;
    --rb: #3a86ff;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial;
    background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
    color: var(--text);
}

.header {
    padding: 20px;
    border-bottom: 1px solid #111;
}

.title {
    font-size: 26px;
    font-weight: 800;
}

.subtitle {
    color: var(--muted);
    font-size: 13px;
}

.container {
    padding: 16px;
    padding-bottom: 100px;
}

.card {
    background: #111;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid #1f1f1f;
}

.card h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0b0b0b;
    display: flex;
    justify-content: space-around;
    padding: 14px 0;
    border-top: 1px solid #1f1f1f;
}

.nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
}

.nav a.active {
    color: white;
}

.bar {
    height: 10px;
    background: #1f1f1f;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 6px;
}

.bar-fill {
    height: 100%;
    border-radius: 10px;
}

.aston { background: var(--aston); }
.mercedes { background: var(--mercedes); }
.ferrari { background: var(--ferrari); }
.mclaren { background: var(--mclaren); }
.redbull { background: var(--redbull); }
.alpine { background: var(--alpine); }
.williams { background: var(--williams); }
.audi { background: var(--audi); }
.cadillac { background: var(--cadillac); }
.haas { background: #999; }
.rb { background: var(--rb); }

.stat {
    margin-bottom: 10px;
}

.stat span {
    float: right;
    color: var(--muted);
}
</style></head>
<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">Fórmula 1 · Datos · Simulación · Noticias · Aston Martin</div>
</div>

<div class="nav">
    <a href="#" id="nav-home" onclick="showHome(); return false;">Home</a>
    <a href="#" id="nav-standings" onclick="showStandings(); return false;">Standings</a>
    <a href="#" id="nav-calendar" onclick="showCalendar(); return false;">Calendar</a>
    <a href="#" id="nav-sim" onclick="showSim(); return false;">Sim</a>
    <a href="#" id="nav-predict" onclick="showPredict(); return false;">Predict</a>
    <a href="#" id="nav-aston" onclick="showAston(); return false;">Aston</a>
    <a href="#" id="nav-news" onclick="showNews(); return false;">News</a>
    <a href="#" id="nav-ia" onclick="showIA(); return false;">IA</a>
</div>

<script>
function setActiveNav(tabId) {
    const ids = ["nav-home", "nav-standings", "nav-calendar", "nav-sim", "nav-predict", "nav-aston", "nav-news", "nav-ia"];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
    });
    const active = document.getElementById(tabId);
    if (active) active.classList.add("active");
}

function copyPrompt(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert("Prompt copiado");
    });
}

function saveText(key, value) {
    localStorage.setItem(key, value);
    alert("Guardado en el teléfono");
}

function getText(key) {
    return localStorage.getItem(key) || "";
}

function renderStorageBlock(title, key, promptText) {
    const saved = getText(key);
    return `
        <div class="card">
            <h3>${title}</h3>
            <button class="btn-secondary" onclick='copyPrompt(${JSON.stringify(promptText)})'>Copiar prompt</button>
            <textarea id="${key}_input" placeholder="Pega aquí la respuesta de ChatGPT...">${saved}</textarea>
            <button class="btn" onclick="saveText('${key}', document.getElementById('${key}_input').value)">Guardar</button>
        </div>

        <div class="card">
            <h3>${title} guardado</h3>
            <pre class="saved-output">${saved ? saved : "Todavía no has guardado contenido."}</pre>
        </div>
    `;
}
