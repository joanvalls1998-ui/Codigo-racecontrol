<!DOCTYPE html>
<html>
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b0b0b;
            color: white;
        }

        .header {
            background-color: #111;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid red;
        }

        .container {
            padding: 20px;
            padding-bottom: 90px;
        }

        .card {
            background-color: #1a1a1a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
        }

        .card h3 {
            margin-top: 0;
            color: #ff4747;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #111;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid red;
        }

        .nav button {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: red;
        }
    </style>
</head>

<body>

<div class="header">
    RaceControl
</div>

<div class="container" id="content">
</div>

<div class="nav">
    <button onclick="showHome()">Home</button>
    <button onclick="showStandings()">Standings</button>
    <button onclick="showCalendar()">Calendar</button>
</div>

    document.getElementById("content").innerHTML = `

}
