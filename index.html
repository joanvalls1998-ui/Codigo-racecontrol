<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RaceControl</title>

    <style>
        :root {
            --bg: #040506;
            --bg-2: #071116;
            --text: #ffffff;
            --muted: rgba(235, 235, 245, 0.62);
            --muted-2: rgba(235, 235, 245, 0.42);
            --line: rgba(255, 255, 255, 0.10);
            --glass: rgba(255,255,255,0.08);
            --glass-2: rgba(255,255,255,0.04);
            --glass-3: rgba(255,255,255,0.12);

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #2446ff;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #b8b8b8;
            --cadillac: #c6a300;
            --haas: #c9c9c9;
            --rb: #2a6aff;

            --radius-xl: 28px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;

            --shadow-soft: 0 20px 60px rgba(0,0,0,0.34);
            --shadow-card: 0 18px 40px rgba(0,0,0,0.28);
            --shadow-nav: 0 18px 50px rgba(0,0,0,0.42);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0,210,190,0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(58,134,255,0.12), transparent 24%),
                radial-gradient(circle at bottom center, rgba(255,255,255,0.04), transparent 30%),
                linear-gradient(180deg, #06090c 0%, #040506 100%);
        }

        body {
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            border-radius: 999px;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.55;
            z-index: 0;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: 120px;
            left: -60px;
            background: rgba(0,210,190,0.16);
        }

        body::after {
            width: 260px;
            height: 260px;
            right: -80px;
            bottom: 120px;
            background: rgba(58,134,255,0.12);
        }

        .app {
            position: relative;
            z-index: 1;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            padding:
                calc(16px + env(safe-area-inset-top))
                16px
                10px
                16px;
            background: linear-gradient(180deg, rgba(5,7,9,0.78), rgba(5,7,9,0.42));
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-shell {
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 18px;
            border-radius: 24px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 12px 30px rgba(0,0,0,0.20);
        }

        .title {
            font-size: 31px;
            font-weight: 800;
            letter-spacing: -0.8px;
            line-height: 1.02;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--muted);
            letter-spacing: -0.1px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 16px 132px 16px;
        }

        .card {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: var(--radius-xl);
            padding: 18px;
            margin-bottom: 14px;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(255,255,255,0.03),
                var(--shadow-card);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.12), transparent 30%, transparent 70%, rgba(255,255,255,0.04));
            pointer-events: none;
            opacity: 0.55;
        }

        .home-hero,
        .favorite-card {
            background:
                radial-gradient(circle at top left, rgba(0,210,190,0.16), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 24px 50px rgba(0,0,0,0.32),
                0 0 0 1px rgba(0,210,190,0.08);
        }

        .card-title {
            position: relative;
            z-index: 1;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
        }

        .card-sub {
            position: relative;
            z-index: 1;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.45;
        }

        .pill {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.7px;
            color: rgba(255,255,255,0.74);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            margin-bottom: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .stat {
            position: relative;
            z-index: 1;
            font-size: 15px;
            margin-bottom: 10px;
            line-height: 1.35;
            color: rgba(255,255,255,0.94);
        }

        .stat span {
            float: right;
            color: rgba(255,255,255,0.76);
            font-weight: 700;
        }

        .bar {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 12px;
            margin-top: 7px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
            box-shadow:
                0 0 14px rgba(255,255,255,0.18),
                inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .aston { background: linear-gradient(90deg, rgba(0,210,190,0.9), rgba(132,255,242,0.92)); }
        .mercedes { background: linear-gradient(90deg, rgba(0,170,255,0.9), rgba(126,226,255,0.95)); }
        .ferrari { background: linear-gradient(90deg, rgba(255,59,48,0.92), rgba(255,120,98,0.96)); }
        .mclaren { background: linear-gradient(90deg, rgba(255,135,0,0.92), rgba(255,200,84,0.96)); }
        .redbull { background: linear-gradient(90deg, rgba(36,70,255,0.9), rgba(93,151,255,0.95)); }
        .alpine { background: linear-gradient(90deg, rgba(76,201,240,0.9), rgba(161,235,255,0.95)); }
        .williams { background: linear-gradient(90deg, rgba(58,134,255,0.9), rgba(125,184,255,0.95)); }
        .audi { background: linear-gradient(90deg, rgba(184,184,184,0.85), rgba(240,240,240,0.96)); }
        .cadillac { background: linear-gradient(90deg, rgba(198,163,0,0.9), rgba(255,228,114,0.96)); }
        .haas { background: linear-gradient(90deg, rgba(201,201,201,0.85), rgba(243,243,243,0.95)); }
        .rb { background: linear-gradient(90deg, rgba(42,106,255,0.9), rgba(121,171,255,0.95)); }

        .btn {
            position: relative;
            z-index: 1;
            width: 100%;
            border: 0;
            border-radius: 18px;
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            color: white;
            background: linear-gradient(90deg, #ff2a20, #ff5b4f);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.18),
                0 14px 28px rgba(225, 6, 0, 0.28);
        }

        .btn:active {
            transform: scale(0.995);
        }

        .nav {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 40;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 6px;
            padding: 8px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
            backdrop-filter: blur(26px) saturate(190%);
            -webkit-backdrop-filter: blur(26px) saturate(190%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                var(--shadow-nav);
        }

        .nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.54);
            font-size: 13px;
            font-weight: 800;
            min-width: 56px;
            text-align: center;
            padding: 13px 10px;
            border-radius: 18px;
            transition: 0.18s ease;
        }

        .nav a.active {
            color: white;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 10px 20px rgba(0,0,0,0.18);
        }

        .favorite-label {
            position: relative;
            z-index: 1;
            font-size: 11px;
            color: rgba(255,255,255,0.56);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .favorite-main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .favorite-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .team-stripe {
            width: 7px;
            height: 58px;
            border-radius: 999px;
            background: var(--aston);
            flex: 0 0 auto;
            box-shadow: 0 0 18px rgba(0,210,190,0.40);
        }

        .driver-number {
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
            min-width: 44px;
            text-align: center;
            flex: 0 0 auto;
            letter-spacing: -1px;
        }

        .favorite-name {
            font-size: 19px;
            font-weight: 800;
            line-height: 1.08;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.35px;
        }

        .favorite-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
        }

        .favorite-points {
            text-align: right;
            flex: 0 0 auto;
        }

        .favorite-points-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .favorite-points-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hero-main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .hero-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .hero-avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            flex: 0 0 auto;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 8px 18px rgba(0,0,0,0.20);
        }

        .hero-badge {
            min-width: 52px;
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            flex: 0 0 auto;
            letter-spacing: -1px;
        }

        .hero-name {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.06;
            letter-spacing: -0.55px;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
        }

        .hero-points {
            text-align: right;
            flex: 0 0 auto;
        }

        .hero-points-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
        }

        .hero-points-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .standings-toggle {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .toggle-btn {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            font-weight: 800;
            padding: 14px 12px;
            border-radius: 18px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .toggle-btn.active {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.07));
            border-color: rgba(255,255,255,0.14);
        }

        .standing-row {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .standing-row:last-child {
            border-bottom: none;
        }

        .row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .row-pos {
            width: 24px;
            color: var(--muted);
            font-size: 13px;
            flex: 0 0 auto;
        }

        .row-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex: 0 0 auto;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 8px 16px rgba(0,0,0,0.18);
        }

        .row-stripe {
            width: 4px;
            height: 46px;
            border-radius: 999px;
            flex: 0 0 auto;
            box-shadow: 0 0 14px rgba(255,255,255,0.08);
        }

        .row-number {
            width: 38px;
            text-align: center;
            font-size: 27px;
            font-weight: 800;
            line-height: 1;
            flex: 0 0 auto;
            letter-spacing: -0.8px;
        }

        .row-info {
            min-width: 0;
        }

        .row-name {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }

        .row-team {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .team-logo {
            height: 14px;
            width: auto;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            opacity: 0.9;
        }

        .row-points {
            text-align: right;
            font-size: 19px;
            font-weight: 800;
            flex: 0 0 auto;
            letter-spacing: -0.3px;
        }

        .row-points small {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .fav-btn {
            margin-top: 7px;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.10);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            color: rgba(255,255,255,0.68);
            font-size: 14px;
            line-height: 1;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .fav-btn.active {
            color: #ffd54a;
            border-color: rgba(255,213,74,0.30);
            background:
                linear-gradient(180deg, rgba(255,213,74,0.18), rgba(255,213,74,0.08));
            box-shadow: 0 0 16px rgba(255,213,74,0.14);
        }

        .news-item {
            position: relative;
            z-index: 1;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-link {
            text-decoration: none;
            color: white;
            display: block;
            line-height: 1.45;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.15px;
        }

        .news-source {
            font-size: 12px;
            color: var(--muted);
            margin-top: 7px;
        }

        .menu-link {
            position: relative;
            z-index: 1;
            display: block;
            text-decoration: none;
            color: white;
            font-weight: 800;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            letter-spacing: -0.15px;
        }

        .menu-link:last-child {
            border-bottom: none;
        }

        .list-line {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .list-line:last-child {
            border-bottom: none;
        }

        .list-left {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.12px;
        }

        .list-right {
            font-size: 13px;
            color: var(--muted);
            text-align: right;
        }

        pre.ai-output {
            position: relative;
            z-index: 1;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.55;
            color: rgba(255,255,255,0.92);
        }

        @media (max-width: 560px) {
            .title {
                font-size: 28px;
            }

            .hero-name,
            .favorite-name {
                font-size: 18px;
            }

            .hero-badge,
            .driver-number {
                font-size: 34px;
            }

            .container {
                padding-left: 14px;
                padding-right: 14px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-shell">
                <div class="title">RaceControl</div>
                <div class="subtitle" id="appSubtitle">F1 · Alonso · Aston Martin</div>
            </div>
        </div>

        <div class="container" id="content"></div>

        <div class="nav">
            <a href="#" id="nav-home" onclick="showHome(); return false;">Inicio</a>
            <a href="#" id="nav-predict" onclick="showPredict(); return false;">Predicción</a>
            <a href="#" id="nav-favorito" onclick="showFavorito(); return false;">Favorito</a>
            <a href="#" id="nav-news" onclick="showNews(); return false;">Noticias</a>
            <a href="#" id="nav-more" onclick="showMore(); return false;">Más</a>
        </div>
    </div>

    <script>
        let standingsCache = null;

        function setActiveNav(tabId) {
            const ids = ["nav-home", "nav-predict", "nav-favorito", "nav-news", "nav-more"];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove("active");
            });
            const active = document.getElementById(tabId);
            if (active) active.classList.add("active");
        }

        function getDefaultFavorite() {
            return {
                type: "driver",
                name: "Fernando Alonso",
                team: "Aston Martin",
                number: "14",
                points: "0",
                colorClass: "aston",
                image: "https://media.formula1.com/image/upload/f_auto,c_limit,q_auto,w_1320/content/dam/fom-website/drivers/2025Drivers/alonso",
                pos: "21"
            };
        }

        function getFavorite() {
            try {
                const saved = localStorage.getItem("racecontrolFavorite");
                return saved ? JSON.parse(saved) : getDefaultFavorite();
            } catch (e) {
                return getDefaultFavorite();
            }
        }

        function saveFavorite(favorite) {
            localStorage.setItem("racecontrolFavorite", JSON.stringify(favorite));
        }

        function updateSubtitle() {
            const favorite = getFavorite();
            const subtitle = document.getElementById("appSubtitle");
            if (!subtitle) return;

            if (favorite.type === "driver") {
                subtitle.textContent = `F1 · ${favorite.name} · ${favorite.team}`;
            } else {
                subtitle.textContent = `F1 · ${favorite.name}`;
            }
        }

        function getFavoriteTeamName() {
            const favorite = getFavorite();
            return favorite.type === "driver" ? favorite.team : favorite.name;
        }

        function getFavoriteColorClass() {
            return getFavorite().colorClass || "aston";
        }

        async function fetchStandingsData(force = false) {
            if (standingsCache && !force) return standingsCache;

            const response = await fetch("/api/standings");
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data?.error || "No se pudo cargar la clasificación");
            }

            standingsCache = data;
            refreshFavoriteFromStandings(data);
            return data;
        }

        function refreshFavoriteFromStandings(data) {
            const favorite = getFavorite();

            if (favorite.type === "driver") {
                const driver = (data.drivers || []).find(d => d.name === favorite.name);
                if (!driver) return;

                saveFavorite({
                    ...favorite,
                    team: driver.team,
                    number: driver.number,
                    points: String(driver.points),
                    colorClass: driver.colorClass,
                    image: driver.image,
                    pos: String(driver.pos)
                });
            } else {
                const team = (data.teams || []).find(t => t.team === favorite.name);
                if (!team) return;

                saveFavorite({

                    name: team.team,
                    drivers: team.drivers,
                    points: String(team.points),
                    colorClass: team.colorClass,
                    pos: String(team.pos)
                });
            }
        }

        function getTeamData(team) {
            const data = {
                "Mercedes": { racePace: 92, qualyPace: 91, reliability: 83, outlook: "Alta", drivers: ["George Russell", "Kimi Antonelli"], forms: [90, 88] },
                "Ferrari": { racePace: 88, qualyPace: 87, reliability: 78, outlook: "Alta", drivers: ["Charles Leclerc", "Lewis Hamilton"], forms: [89, 87] },
                "McLaren": { racePace: 84, qualyPace: 85, reliability: 82, outlook: "Alta", drivers: ["Lando Norris", "Oscar Piastri"], forms: [88, 88] },
                "Red Bull": { racePace: 80, qualyPace: 82, reliability: 74, outlook: "Media", drivers: ["Max Verstappen", "Isack Hadjar"], forms: [91, 77] },
                "Aston Martin": { racePace: 72, qualyPace: 68, reliability: 61, outlook: "Media", drivers: ["Fernando Alonso", "Lance Stroll"], forms: [88, 82] },
                "Alpine": { racePace: 66, qualyPace: 61, reliability: 58, outlook: "Media", drivers: ["Pierre Gasly", "Franco Colapinto"], forms: [82, 76] },
                "Williams": { racePace: 64, qualyPace: 60, reliability: 63, outlook: "Media", drivers: ["Carlos Sainz", "Alexander Albon"], forms: [81, 79] },
                "Audi": { racePace: 61, qualyPace: 58, reliability: 67, outlook: "Media", drivers: ["Nico Hulkenberg", "Gabriel Bortoleto"], forms: [77, 74] },
                "Cadillac": { racePace: 59, qualyPace: 56, reliability: 60, outlook: "Media", drivers: ["Sergio Perez", "Valtteri Bottas"], forms: [78, 75] },
                "Haas": { racePace: 63, qualyPace: 59, reliability: 64, outlook: "Media", drivers: ["Esteban Ocon", "Oliver Bearman"], forms: [78, 80] },
                "Racing Bulls": { racePace: 68, qualyPace: 65, reliability: 66, outlook: "Media", drivers: ["Liam Lawson", "Arvid Lindblad"], forms: [79, 75] }
            };

            return data[team] || {
                racePace: 70,
                qualyPace: 67,
                reliability: 62,
                outlook: "Media",
                drivers: ["Piloto 1", "Piloto 2"],
                forms: [80, 78]
            };
        }

        function sameDriverName(a, b) {
            if (!a || !b) return false;
            const aa = a.toLowerCase().trim();
            const bb = b.toLowerCase().trim();
            return aa === bb || aa.includes(bb) || bb.includes(aa);
        }

        function getDriverComparison(team, driverName) {
            const teamData = getTeamData(team);
            const [driverA, driverB] = teamData.drivers;
            const [formA, formB] = teamData.forms;

            if (sameDriverName(driverName, driverA)) {
                return { primaryName: driverA, primaryForm: formA, secondaryName: driverB, secondaryForm: formB };
            }

            if (sameDriverName(driverName, driverB)) {
                return { primaryName: driverB, primaryForm: formB, secondaryName: driverA, secondaryForm: formA };
            }

            return { primaryName: driverA, primaryForm: formA, secondaryName: driverB, secondaryForm: formB };
        }

        function formatCalendarDateRange(start, end) {
            const startDate = new Date(`${start}T12:00:00`);
            const endDate = new Date(`${end}T12:00:00`);

            const startDay = startDate.getDate();
            const endDay = endDate.getDate();

            const startMonth = startDate.toLocaleDateString("es-ES", { month: "short" });
            const endMonth = endDate.toLocaleDateString("es-ES", { month: "short" });

            if (startMonth === endMonth) {
                return `${startDay}-${endDay} ${startMonth}`;
            }

            return `${startDay} ${startMonth} - ${endDay} ${endMonth}`;
        }

        function getCalendarStatusLabel(status, type) {
            if (type === "testing" && status === "completed") return "Pretemporada completada";
            if (status === "completed") return "Completado";
            if (status === "next") return "Siguiente";
            return "Próximamente";
        }

        function formatNewsDate(pubDate) {
            if (!pubDate) return "";
            const date = new Date(pubDate);
            if (Number.isNaN(date.getTime())) return "";
            return date.toLocaleDateString("es-ES", {
                day: "2-digit",
                month: "short"
            });
        }

                type: "team",
                name,
                drivers,
                points,
                colorClass,
                pos
            });

            const wasTeams = document.getElementById("teamsBtn")?.classList.contains("active");
            showStandings();
            if (wasTeams) {
                setTimeout(showTeamsStandings, 50);
            }
        }

        async function showCalendar() {
            setActiveNav("nav-more");
            updateSubtitle();

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <div class="card-title">Calendario</div>
                    <div class="card-sub">Cargando calendario oficial 2026…</div>
                </div>
            `;

            try {
                const response = await fetch("/api/calendar");
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data?.error || "No se pudo cargar el calendario");
                }

                const events = Array.isArray(data.events) ? data.events : [];

                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title">Calendario</div>
                        <div class="card-sub">Temporada 2026 · calendario real</div>

                        ${events.map(event => `
                            <div class="list-line">
                                <div class="list-left">
                                    ${event.type === "race"
                                        ? `R${event.round} · ${event.venue}`
                                        : `${event.title}`}
                                </div>
                                <div class="list-right">
                                    ${getCalendarStatusLabel(event.status, event.type)} · ${formatCalendarDateRange(event.start, event.end)}
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            } catch (error) {
                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title">Calendario</div>
                        <div class="card-sub">Error al cargar el calendario</div>
                        <pre class="ai-output">${error.message}</pre>
                    </div>
                `;
            }
        }

        updateSubtitle();
        fetchStandingsData().catch(() => {});
        showHome();
    </script>
</body>
</html>
