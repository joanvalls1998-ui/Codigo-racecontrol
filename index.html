<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #060606;
            --panel: #121212;
            --text: #f5f5f5;
            --muted: #9a9a9a;
            --line: #262626;

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #1e3a8a;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #aaaaaa;
            --cadillac: #c6a300;
            --haas: #999999;
            --rb: #3a86ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            color: var(--text);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #111;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(8px);
        }

        .title {
            font-size: 26px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .container {
            padding: 16px;
            padding-bottom: 100px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #1f1f1f;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .card p {
            margin: 6px 0;
            line-height: 1.45;
        }

        .small {
            color: var(--muted);
            font-size: 13px;
        }

        .highlight {
            font-weight: 700;
            color: white;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0b0b0b;
            display: flex;
            justify-content: space-around;
            padding: 14px 0 calc(14px + env(safe-area-inset-bottom));
            border-top: 1px solid #1f1f1f;
            overflow-x: auto;
            gap: 6px;
        }

        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            min-width: 52px;
            text-align: center;
            padding: 6px 8px;
            border-radius: 10px;
        }

        .nav a.active {
            color: white;
            background: rgba(255,255,255,0.06);
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(255,255,255,0.06);
            margin-bottom: 8px;
        }

        .pill-ai {
            color: var(--mclaren);
            border: 1px solid rgba(255,135,0,0.3);
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        .stat {
            margin-bottom: 10px;
        }

        .stat span {
            float: right;
            color: var(--muted);
        }

        .bar {
            height: 10px;
            background: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
        }

        .aston { background: var(--aston); }
        .mercedes { background: var(--mercedes); }
        .ferrari { background: var(--ferrari); }
        .mclaren { background: var(--mclaren); }
        .redbull { background: var(--redbull); }
        .alpine { background: var(--alpine); }
        .williams { background: var(--williams); }
        .audi { background: var(--audi); }
        .cadillac { background: var(--cadillac); }
        .haas { background: var(--haas); }
        .rb { background: var(--rb); }

        .sim-grid {
            display: grid;
            gap: 10px;
        }

        .sim-line {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        .sim-line:last-child {
            border-bottom: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .news-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-source {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #e10600, #ff3b30);
            color: white;
            font-size: 15px;
            font-weight: 800;
            margin-top: 12px;
        }

        .menu-link {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .menu-link:last-child {
            border-bottom: none;
        }

        pre.ai-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .segmented {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .segmented .btn {
            flex: 1;
            margin-top: 0;
            padding: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">F1 completa · foco en Alonso y Aston Martin</div>
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" id="nav-home" onclick="showHome(); return false;">Home</a>
    <a href="#" id="nav-predict" onclick="showPredict(); return false;">Predict</a>
    <a href="#" id="nav-aston" onclick="showAston(); return false;">Aston</a>
    <a href="#" id="nav-news" onclick="showNews(); return false;">News</a>
    <a href="#" id="nav-more" onclick="showMore(); return false;">More</a>
</div>

<script>
function setActiveNav(tabId) {
    const ids = ["nav-home", "nav-predict", "nav-aston", "nav-news", "nav-more"];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
    });
    const active = document.getElementById(tabId);
    if (active) active.classList.add("active");
}

function showHome() {

            </div>

            <div class="bar">
                <div class="bar-fill ferrari" style="width: 28%;"></div>
            </div>
        </div>

        <div class="card">

            </div>

            <p>El equipo sigue centrado en mejorar fiabilidad y completar fines de semana limpios.</p>
            <p class="small">Foco principal: Alonso, Stroll, motor Honda y ritmo de carrera.</p>

            <div class="bar"><div class="bar-fill mercedes" style="width:92%;"></div></div>

            <div class="stat" style="margin-top:12px;">Ferrari <span>88%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:88%;"></div></div>

            <div class="stat" style="margin-top:12px;">McLaren <span>84%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:84%;"></div></div>

            <div class="stat" style="margin-top:12px;">Red Bull <span>80%</span></div>
            <div class="bar"><div class="bar-fill redbull" style="width:80%;"></div></div>

            <div class="stat" style="margin-top:12px;">Aston Martin <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%;"></div></div>
        </div>
    `;
}

async function generatePredict() {
    const output = document.getElementById("predictResult");
    output.innerText = "Generando predicción con IA...";

    try {
        const res = await fetch("/api/predict");
        const data = await res.json();

        if (data.result) {
            output.innerText = data.result;
        } else {
            output.innerText = "Error generando predicción.";
        }
    } catch (error) {
        output.innerText = "Error de conexión con la IA.";
    }
}

function showPredict() {
    setActiveNav("nav-predict");

    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="pill pill-ai">PREDICT · GPT REAL</div>
            <div class="section-title">Miami GP · Predicción IA</div>
            <p>Predicción automática del siguiente GP con foco en Alonso y Aston Martin.</p>
            <button class="btn" onclick="generatePredict()">Generar predicción IA</button>
        </div>

        <div class="card">
            <h3>AI RESULT</h3>
            <pre id="predictResult" class="ai-output">Pulsa el botón para generar predicción.</pre>
        </div>
    `;
}

function showNews() {
