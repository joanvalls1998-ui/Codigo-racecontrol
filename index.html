<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #060606;
            --panel: #121212;
            --text: #f5f5f5;
            --muted: #9a9a9a;
            --line: #262626;

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #1e3a8a;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #aaaaaa;
            --cadillac: #c6a300;
            --haas: #999999;
            --rb: #3a86ff;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: #050505;
            color: var(--text);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid #111;
            background: #080808;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .container {
            padding: 16px;
            padding-bottom: 100px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #1f1f1f;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .stat {
            margin-bottom: 10px;
        }

        .stat span {
            float: right;
            color: var(--muted);
        }

        .bar {
            height: 10px;
            background: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
        }

        .aston { background: var(--aston); }
        .mercedes { background: var(--mercedes); }
        .ferrari { background: var(--ferrari); }
        .mclaren { background: var(--mclaren); }
        .redbull { background: var(--redbull); }
        .alpine { background: var(--alpine); }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0b0b0b;
            display: flex;
            justify-content: space-around;
            padding: 14px 0;
            border-top: 1px solid #1f1f1f;
        }

        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }

        .nav a.active {
            color: white;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #e10600, #ff3b30);
            color: white;
            font-size: 15px;
            font-weight: 800;
            margin-top: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid #262626;
        }

        th {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">F1 · Alonso · Aston Martin</div>
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" id="nav-home" onclick="showHome()">Home</a>
    <a href="#" id="nav-predict" onclick="showPredict()">Predict</a>
    <a href="#" id="nav-aston" onclick="showAston()">Aston</a>
    <a href="#" id="nav-news" onclick="showNews()">News</a>
    <a href="#" id="nav-more" onclick="showMore()">More</a>
</div>

<script>
function setActiveNav(tab) {
    document.querySelectorAll(".nav a").forEach(a => a.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

function showHome() {
    setActiveNav("nav-home");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3 style="color: var(--aston);">ALONSO STATUS</h3>
            <div class="stat">Position <span>P22</span></div>
            <div class="stat">Points <span>0</span></div>
            <div class="stat">Last race <span>DNF</span></div>

            <div class="stat">Points probability <span>32%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:32%"></div></div>

            <div class="stat">DNF risk <span>28%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:28%"></div></div>
        </div>

        <div class="card">
            <h3 style="color: var(--aston);">ASTON MARTIN STATUS</h3>
            <div class="stat">Race pace <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%"></div></div>

            <div class="stat">Quali pace <span>68%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:68%"></div></div>

            <div class="stat">Reliability <span>61%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:61%"></div></div>
        </div>

        <div class="card">
            <h3>NEXT RACE · MIAMI</h3>
            <div class="stat">Safety Car <span>42%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:42%"></div></div>

            <div class="stat">Rain <span>18%</span></div>
            <div class="bar"><div class="bar-fill alpine" style="width:18%"></div></div>
        </div>

        <div class="card">
            <h3>TEAM HIERARCHY</h3>
            <div class="stat">Mercedes <span>92%</span></div>
            <div class="bar"><div class="bar-fill mercedes" style="width:92%"></div></div>

            <div class="stat">Ferrari <span>88%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:88%"></div></div>

            <div class="stat">McLaren <span>84%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:84%"></div></div>

            <div class="stat">Red Bull <span>80%</span></div>
            <div class="bar"><div class="bar-fill redbull" style="width:80%"></div></div>

            <div class="stat">Aston <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%"></div></div>
        </div>
    `;
}

async function generatePredict() {
    const output = document.getElementById("predictResult");
    output.innerText = "Generando predicción...";
    try {
        const res = await fetch("/api/predict");
        const data = await res.json();
        output.innerText = data.result || "Error";
    } catch {
        output.innerText = "Error conexión IA";
    }
}

function showPredict() {
    setActiveNav("nav-predict");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Predict · IA</h3>
            <button class="btn" onclick="generatePredict()">Generar predicción</button>
        </div>
        <div class="card">
            <pre id="predictResult">Pulsa generar.</pre>
        </div>
    `;
}

function showAston() {
    setActiveNav("nav-aston");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3 style="color: var(--aston);">ASTON MARTIN</h3>
            <div class="stat">Race pace <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%"></div></div>

            <div class="stat">Quali pace <span>68%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:68%"></div></div>

            <div class="stat">Reliability <span>61%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:61%"></div></div>
        </div>
    `;
}

function showNews() {
    setActiveNav("nav-news");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>NEWS</h3>
            <p>Aston Martin sigue centrado en fiabilidad.</p>
            <p>Mercedes lidera el campeonato.</p>
            <p>Ferrari segunda fuerza.</p>
        </div>
    `;
}

function showMore() {
    setActiveNav("nav-more");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>More</h3>
            <button class="btn" onclick="showStandings()">Standings</button>
            <button class="btn" onclick="showCalendar()">Calendar</button>
        </div>
    `;
}

function showStandings() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <button class="btn" onclick="showDrivers()">Drivers</button>
            <button class="btn" onclick="showTeams()">Teams</button>
        </div>
        <div id="standings"></div>
    `;
    showDrivers();
}

function showDrivers() {
    document.getElementById("standings").innerHTML = `
        <div class="card">
        <table>
        <tr><th>Pos</th><th>Piloto</th><th>Puntos</th></tr>
        <tr><td>1</td><td style="color:var(--mercedes)">Antonelli</td><td>72</td></tr>
        <tr><td>2</td><td style="color:var(--mercedes)">Russell</td><td>63</td></tr>
        <tr><td>3</td><td style="color:var(--ferrari)">Leclerc</td><td>49</td></tr>
        <tr><td>4</td><td style="color:var(--ferrari)">Hamilton</td><td>41</td></tr>
        <tr><td>21</td><td style="color:var(--aston)">Stroll</td><td>0</td></tr>
        <tr><td>22</td><td style="color:var(--aston)">Alonso</td><td>0</td></tr>
        </table>
        </div>
    `;
}

function showTeams() {
    document.getElementById("standings").innerHTML = `
        <div class="card">
        <table>
        <tr><th>Pos</th><th>Equipo</th><th>Puntos</th></tr>
        <tr><td>1</td><td style="color:var(--mercedes)">Mercedes</td><td>135</td></tr>
        <tr><td>2</td><td style="color:var(--ferrari)">Ferrari</td><td>90</td></tr>
        <tr><td>11</td><td style="color:var(--aston)">Aston Martin</td><td>0</td></tr>
        </table>
        </div>
    `;
}

function showCalendar() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Calendar</h3>
            <p>Australia — Done</p>
            <p>China — Done</p>
            <p>Japan — Done</p>
            <p>Miami — Next</p>
            <p>Canada</p>
            <p>Monaco</p>
        </div>
    `;
}

showHome();
</script>

</body>
</html>
