<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RaceControl</title>

    <style>
        :root {
            --bg: #040506;
            --bg-2: #071116;
            --text: #ffffff;
            --muted: rgba(235, 235, 245, 0.62);
            --muted-2: rgba(235, 235, 245, 0.42);
            --line: rgba(255, 255, 255, 0.10);

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #2446ff;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #b8b8b8;
            --cadillac: #c6a300;
            --haas: #c9c9c9;
            --rb: #2a6aff;

            --radius-xl: 28px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;

            --shadow-card: 0 18px 40px rgba(0,0,0,0.28);
            --shadow-nav: 0 18px 50px rgba(0,0,0,0.42);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0,210,190,0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(58,134,255,0.12), transparent 24%),
                radial-gradient(circle at bottom center, rgba(255,255,255,0.04), transparent 30%),
                linear-gradient(180deg, #06090c 0%, #040506 100%);
        }

        body {
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            border-radius: 999px;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.55;
            z-index: 0;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: 120px;
            left: -60px;
            background: rgba(0,210,190,0.16);
        }

        body::after {
            width: 260px;
            height: 260px;
            right: -80px;
            bottom: 120px;
            background: rgba(58,134,255,0.12);
        }

        .app {
            position: relative;
            z-index: 1;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            padding:
                calc(16px + env(safe-area-inset-top))
                16px
                10px
                16px;
            background: linear-gradient(180deg, rgba(5,7,9,0.78), rgba(5,7,9,0.42));
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-shell {
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 18px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 12px 30px rgba(0,0,0,0.20);
        }

        .title {
            font-size: 31px;
            font-weight: 800;
            letter-spacing: -0.8px;
            line-height: 1.02;
        }

        .subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--muted);
            letter-spacing: -0.1px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 16px 132px 16px;
        }

        .card {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: var(--radius-xl);
            padding: 18px;
            margin-bottom: 14px;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(255,255,255,0.03),
                var(--shadow-card);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 30%, transparent 70%, rgba(255,255,255,0.04));
            pointer-events: none;
            opacity: 0.55;
        }

        .home-hero,
        .favorite-card,
        .highlight-card {
            background:
                radial-gradient(circle at top left, rgba(0,210,190,0.16), transparent 42%),
                linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 24px 50px rgba(0,0,0,0.32),
                0 0 0 1px rgba(0,210,190,0.08);
        }

        .card-title {
            position: relative;
            z-index: 1;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
        }

        .card-sub {
            position: relative;
            z-index: 1;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.45;
        }

        .pill, .mini-pill, .trend-pill {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.6px;
            color: rgba(255,255,255,0.74);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .mini-pill {
            padding: 6px 10px;
            font-size: 10px;
            margin-bottom: 10px;
        }

        .trend-pill.up {
            color: #78ffd6;
            border-color: rgba(120,255,214,0.26);
            background: rgba(120,255,214,0.10);
        }

        .trend-pill.down {
            color: #ff9a91;
            border-color: rgba(255,154,145,0.24);
            background: rgba(255,154,145,0.10);
        }

        .trend-pill.neutral {
            color: #ffe28a;
            border-color: rgba(255,226,138,0.20);
            background: rgba(255,226,138,0.10);
        }

        .stat {
            position: relative;
            z-index: 1;
            font-size: 15px;
            margin-bottom: 10px;
            line-height: 1.35;
            color: rgba(255,255,255,0.94);
        }

        .stat span {
            float: right;
            color: rgba(255,255,255,0.76);
            font-weight: 700;
        }

        .bar {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 12px;
            margin-top: 7px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.25);
        }

        .bar-fill {
            height: 100%;
            border-radius: 999px;
            box-shadow:
                0 0 14px rgba(255,255,255,0.18),
                inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .aston { background: linear-gradient(90deg, rgba(0,210,190,0.9), rgba(132,255,242,0.92)); }
        .mercedes { background: linear-gradient(90deg, rgba(0,170,255,0.9), rgba(126,226,255,0.95)); }
        .ferrari { background: linear-gradient(90deg, rgba(255,59,48,0.92), rgba(255,120,98,0.96)); }
        .mclaren { background: linear-gradient(90deg, rgba(255,135,0,0.92), rgba(255,200,84,0.96)); }
        .redbull { background: linear-gradient(90deg, rgba(36,70,255,0.9), rgba(93,151,255,0.95)); }
        .alpine { background: linear-gradient(90deg, rgba(76,201,240,0.9), rgba(161,235,255,0.95)); }
        .williams { background: linear-gradient(90deg, rgba(58,134,255,0.9), rgba(125,184,255,0.95)); }
        .audi { background: linear-gradient(90deg, rgba(184,184,184,0.85), rgba(240,240,240,0.96)); }
        .cadillac { background: linear-gradient(90deg, rgba(198,163,0,0.9), rgba(255,228,114,0.96)); }
        .haas { background: linear-gradient(90deg, rgba(201,201,201,0.85), rgba(243,243,243,0.95)); }
        .rb { background: linear-gradient(90deg, rgba(42,106,255,0.9), rgba(121,171,255,0.95)); }

        .btn, .btn-secondary {
            position: relative;
            z-index: 1;
            width: 100%;
            border: 0;
            border-radius: 18px;
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
            color: white;
        }

        .btn {
            background: linear-gradient(90deg, #ff2a20, #ff5b4f);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.18),
                0 14px 28px rgba(225, 6, 0, 0.28);
        }

        .btn-secondary {
            background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .btn:active,
        .btn-secondary:active {
            transform: scale(0.995);
        }

        .select-input {
            position: relative;
            z-index: 1;
            width: 100%;
            margin: 10px 0 14px 0;
            padding: 15px 16px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.10);
            background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
            color: white;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .select-input option {
            background: #111315;
            color: white;
        }

        .nav {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 40;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 6px;
            padding: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));
            backdrop-filter: blur(26px) saturate(190%);
            -webkit-backdrop-filter: blur(26px) saturate(190%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                var(--shadow-nav);
        }

        .nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.54);
            font-size: 13px;
            font-weight: 800;
            min-width: 56px;
            text-align: center;
            padding: 13px 10px;
            border-radius: 18px;
            transition: 0.18s ease;
        }

        .nav a.active {
            color: white;
            background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.10),
                0 10px 20px rgba(0,0,0,0.18);
        }

        .favorite-label {
            position: relative;
            z-index: 1;
            font-size: 11px;
            color: rgba(255,255,255,0.56);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .favorite-main,
        .hero-main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .favorite-left,
        .hero-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .team-stripe {
            width: 7px;
            height: 58px;
            border-radius: 999px;
            background: var(--aston);
            flex: 0 0 auto;
            box-shadow: 0 0 18px rgba(0,210,190,0.40);
        }

        .driver-number {
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
            min-width: 44px;
            text-align: center;
            flex: 0 0 auto;
            letter-spacing: -1px;
        }

        .favorite-name {
            font-size: 19px;
            font-weight: 800;
            line-height: 1.08;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.35px;
        }

        .favorite-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
        }

        .favorite-points,
        .hero-points {
            text-align: right;
            flex: 0 0 auto;
        }

        .favorite-points-value,
        .hero-points-value {
            font-size: 28px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .favorite-points-label,
        .hero-points-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hero-avatar,
        .row-avatar {
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 8px 18px rgba(0,0,0,0.20);
        }

        .hero-avatar {
            width: 58px;
            height: 58px;
            flex: 0 0 auto;
        }

        .hero-badge {
            min-width: 52px;
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            line-height: 1;
            flex: 0 0 auto;
            letter-spacing: -1px;
        }

        .hero-name {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.06;
            letter-spacing: -0.55px;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
        }

        .grid-stats,
        .predict-grid,
        .meta-grid,
        .insight-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .meta-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .stat-tile,
        .meta-tile,
        .insight-tile {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 14px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .stat-kicker,
        .meta-kicker {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: rgba(255,255,255,0.52);
            margin-bottom: 8px;
        }

        .stat-value,
        .meta-value {
            font-size: 23px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.6px;
        }

        .stat-caption,
        .meta-caption {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            line-height: 1.35;
        }

        .next-race-main {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .next-race-title {
            font-size: 24px;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.6px;
        }

        .next-race-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 6px;
        }

        .race-date-box {
            min-width: 108px;
            text-align: right;
            font-size: 13px;
            color: var(--muted);
        }

        .quick-row {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .quick-row > * {
            flex: 1;
        }

        .info-line {
            position: relative;
            z-index: 1;
            font-size: 14px;
            line-height: 1.45;
            color: rgba(255,255,255,0.92);
            margin-bottom: 10px;
        }

        .insight-list {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insight-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 13px 14px;
            line-height: 1.45;
            font-size: 14px;
            color: rgba(255,255,255,0.92);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .standings-toggle {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .toggle-btn {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            font-weight: 800;
            padding: 14px 12px;
            border-radius: 18px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .toggle-btn.active {
            background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.07));
            border-color: rgba(255,255,255,0.14);
        }

        .standing-row {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .standing-row:last-child,
        .news-item:last-child,
        .menu-link:last-child,
        .list-line:last-child {
            border-bottom: none;
        }

        .row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .row-pos {
            width: 24px;
            color: var(--muted);
            font-size: 13px;
            flex: 0 0 auto;
        }

        .row-avatar {
            width: 44px;
            height: 44px;
            flex: 0 0 auto;
        }

        .row-stripe {
            width: 4px;
            height: 46px;
            border-radius: 999px;
            flex: 0 0 auto;
            box-shadow: 0 0 14px rgba(255,255,255,0.08);
        }

        .row-number {
            width: 38px;
            text-align: center;
            font-size: 27px;
            font-weight: 800;
            line-height: 1;
            flex: 0 0 auto;
            letter-spacing: -0.8px;
        }

        .row-info {
            min-width: 0;
        }

        .row-name {
            font-size: 16px;
            font-weight: 800;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }

        .row-team {
            font-size: 13px;
            color: var(--muted);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .team-logo {
            height: 14px;
            width: auto;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            opacity: 0.9;
        }

        .row-points {
            text-align: right;
            font-size: 19px;
            font-weight: 800;
            flex: 0 0 auto;
            letter-spacing: -0.3px;
        }

        .row-points small {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .fav-btn {
            margin-top: 7px;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.10);
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            color: rgba(255,255,255,0.68);
            font-size: 14px;
            line-height: 1;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .fav-btn.active {
            color: #ffd54a;
            border-color: rgba(255,213,74,0.30);
            background: linear-gradient(180deg, rgba(255,213,74,0.18), rgba(255,213,74,0.08));
            box-shadow: 0 0 16px rgba(255,213,74,0.14);
        }

        .news-item,
        .list-line {
            position: relative;
            z-index: 1;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .news-link,
        .menu-link {
            text-decoration: none;
            color: white;
            display: block;
            line-height: 1.45;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.15px;
        }

        .news-source {
            font-size: 12px;
            color: var(--muted);
            margin-top: 7px;
        }

        .menu-link {
            padding: 16px 0;
            font-weight: 800;
        }

        .list-line {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .list-left {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.12px;
        }

        .list-right {
            font-size: 13px;
            color: var(--muted);
            text-align: right;
        }

        pre.ai-output {
            position: relative;
            z-index: 1;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.58;
            color: rgba(255,255,255,0.92);
        }

        .empty-line {
            position: relative;
            z-index: 1;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 640px) {
            .title {
                font-size: 28px;
            }

            .hero-name,
            .favorite-name {
                font-size: 18px;
            }

            .hero-badge,
            .driver-number {
                font-size: 34px;
            }

            .container {
                padding-left: 14px;

            if (standingsCache && !force) return standingsCache;

                throw new Error(data?.error || "No se pudo cargar la clasificación");
            }

            standingsCache = data;
            refreshFavoriteFromStandings(data);
            return data;
        }

            if (calendarCache && !force) return calendarCache;

            const response = await fetch("/api/calendar");
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data?.error || "No se pudo cargar el calendario");
            }

            calendarCache = data;
            const nextRace = getNextRaceFromCalendar((data?.events || []));
            const mappedRace = mapCalendarEventToPredictRace(nextRace);

            return data;

                    image: driver.image,

        function sameDriverName(a, b) {
            if (!a || !b) return false;
            const aa = a.toLowerCase().trim();
            const bb = b.toLowerCase().trim();
            return aa === bb || aa.includes(bb) || bb.includes(aa);
        }

        function getDriverComparison(team, driverName) {
            const teamData = getTeamData(team);
            const [driverA, driverB] = teamData.drivers;
            const [formA, formB] = teamData.forms;

            if (sameDriverName(driverName, driverA)) {
                return { primaryName: driverA, primaryForm: formA, secondaryName: driverB, secondaryForm: formB };
            }

            if (sameDriverName(driverName, driverB)) {
                return { primaryName: driverB, primaryForm: formB, secondaryName: driverA, secondaryForm: formA };
            }

            return { primaryName: driverA, primaryForm: formA, secondaryName: driverB, secondaryForm: formB };
        }

        function getTrendInfo(teamName, favorite) {
            const teamData = getTeamData(teamName);
            let score = teamData.recentTrend || 0;

            if (favorite.type === "driver") {
                const comparison = getDriverComparison(teamName, favorite.name);
                score += (comparison.primaryForm - comparison.secondaryForm) * 0.12;
            }

            if (score >= 2) {
                return {
                    label: "Al alza",
                    className: "up",
                    description: "Llega con señales positivas y mejor lectura del fin de semana."
                };
            }

            if (score <= -1.5) {
                return {
                    label: "A la baja",
                    className: "down",
                    description: "Sigue necesitando un salto claro para estabilizar el rendimiento."
                };
            }

            return {
                label: "Estable",
                className: "neutral",
                description: "Rendimiento contenidamente estable, sin cambios drásticos."
            };
        }

        function getFavoriteStrengthWindow(favorite, teamData) {
            let composite = teamData.racePace * 0.62 + teamData.qualyPace * 0.18 + teamData.reliability * 0.20;

            if (favorite.type === "driver") {
                const comparison = getDriverComparison(favorite.team, favorite.name);
                composite += (comparison.primaryForm - 80) * 0.25;
            } else {
                composite += ((teamData.forms[0] + teamData.forms[1]) / 2 - 80) * 0.15;
            }

            if (composite >= 90) return "P1-P3";
            if (composite >= 85) return "P3-P5";
            if (composite >= 80) return "P5-P7";
            if (composite >= 75) return "P7-P10";
            if (composite >= 70) return "P9-P12";
            if (composite >= 65) return "P11-P14";
            return "P14-P18";
        }

        function getFavoriteHomeMetrics(favorite) {
            const teamName = favorite.type === "driver" ? favorite.team : favorite.name;
            const teamData = getTeamData(teamName);
            const trendInfo = getTrendInfo(teamName, favorite);
            const window = getFavoriteStrengthWindow(favorite, teamData);

            let formBoost = 0;
            if (favorite.type === "driver") {
                const comparison = getDriverComparison(teamName, favorite.name);
                formBoost = (comparison.primaryForm - 80) * 0.5;
            } else {
                formBoost = ((teamData.forms[0] + teamData.forms[1]) / 2 - 80) * 0.3;
            }

            const pointsProbability = Math.round(Math.max(12, Math.min(92, (teamData.racePace - 50) * 1.8 + formBoost)));
            const dnfRisk = Math.round(Math.max(8, Math.min(45, 34 - teamData.reliability * 0.27 + (100 - teamData.racePace) * 0.06)));

            return {
                pointsProbability,
                dnfRisk,
                trendInfo,
                expectedWindow: window,
                teamData
            };
        }

        function getFavoriteInsights(favorite, selectedRace) {
            const teamName = favorite.type === "driver" ? favorite.team : favorite.name;
            const teamData = getTeamData(teamName);
            const insights = [];

            if (favorite.type === "driver") {
                const comparison = getDriverComparison(teamName, favorite.name);

                if (comparison.primaryForm >= comparison.secondaryForm) {
                    insights.push(`${comparison.primaryName} llega por delante de ${comparison.secondaryName} dentro del equipo.`);
                } else {
                    insights.push(`${comparison.primaryName} necesita recortar terreno frente a ${comparison.secondaryName}.`);
                }
            } else {
                if (teamData.forms[0] >= teamData.forms[1]) {
                    insights.push(`${teamData.drivers[0]} es ahora mismo la referencia interna del equipo.`);
                } else {
                    insights.push(`${teamData.drivers[1]} está sosteniendo mejor el rendimiento del equipo.`);
                }
            }

            if (teamData.racePace > teamData.qualyPace) {
                insights.push("El punto fuerte actual está más en ritmo de carrera que en vuelta única.");
            } else if (teamData.qualyPace > teamData.racePace + 3) {
                insights.push("Necesita transformar mejor la clasificación en resultado de carrera.");
            } else {
                insights.push("Qualy y carrera están bastante alineadas, sin una gran debilidad dominante.");
            }

            if (teamData.reliability < 65) {
                insights.push("La fiabilidad sigue siendo el principal factor que puede condicionar el fin de semana.");
            } else if (selectedRace.includes("Mónaco") || selectedRace.includes("Singapur") || selectedRace.includes("Arabia Saudí") || selectedRace.includes("Azerbaiyán") || selectedRace.includes("Miami") || selectedRace.includes("Las Vegas") || selectedRace.includes("Madrid")) {
                insights.push("El siguiente circuito exige precisión y confianza cerca de los muros.");
            } else {
                insights.push("Con un fin de semana limpio, hay base para consolidar un resultado sólido.");
            }

            return insights.slice(0, 3);
        }

        function getNextRaceFromCalendar(events) {

        }

        function formatCalendarDateRange(start, end) {
            const startDate = new Date(`${start}T12:00:00`);
            const endDate = new Date(`${end}T12:00:00`);

            const startDay = startDate.getDate();
            const endDay = endDate.getDate();

            const startMonth = startDate.toLocaleDateString("es-ES", { month: "short" });
            const endMonth = endDate.toLocaleDateString("es-ES", { month: "short" });

            if (startMonth === endMonth) {
                return `${startDay}-${endDay} ${startMonth}`;
            }

            return `${startDay} ${startMonth} - ${endDay} ${endMonth}`;
        }

            if (type === "testing" && status === "completed") return "Pretemporada completada";

            return "Próximamente";

                    dnf: favoritePrediction.dnfProbability != null ? `${favoritePrediction.dnfProbability}%` : "Sin datos"

            return {

        async function runPredict() {
            const output = document.getElementById("predictOutput");
            const favorite = getFavorite();
            const raceSelect = document.getElementById("predictRace");
            const raceName = raceSelect?.value || getSelectedRace();

            saveSelectedRace(raceName);
            output.innerText = "Generando predicción...";

            const summaryBox = document.getElementById("predictSummaryCards");
            const metaBox = document.getElementById("predictMetaCards");

            if (summaryBox) {
                summaryBox.innerHTML = `
                    <div class="predict-grid">
                        <div class="stat-tile"><div class="stat-kicker">Clasificación</div><div class="stat-value">…</div><div class="stat-caption">Calculando</div></div>
                        <div class="stat-tile"><div class="stat-kicker">Carrera</div><div class="stat-value">…</div><div class="stat-caption">Calculando</div></div>
                        <div class="stat-tile"><div class="stat-kicker">Puntos</div><div class="stat-value">…</div><div class="stat-caption">Calculando</div></div>
                        <div class="stat-tile"><div class="stat-kicker">Abandono</div><div class="stat-value">…</div><div class="stat-caption">Calculando</div></div>
                    </div>
                `;
            }

            try {
                const response = await fetch("/api/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        favorite,
                        raceName
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data?.message || data?.error || "Error al generar la predicción");
                }

                lastPredictData = data;

                if (summaryBox) summaryBox.innerHTML = renderPredictSummaryCards(data);
                if (metaBox) metaBox.innerHTML = renderPredictMetaCards(data);

                output.innerText = formatPredictResponse(data);
            } catch (error) {
                output.innerText = `Error: ${error.message}`;
                if (summaryBox) summaryBox.innerHTML = `<div class="empty-line">No se ha podido generar el resumen predictivo.</div>`;
                if (metaBox) metaBox.innerHTML = "";
            }
        }

                            ? `${teamData.drivers[0]} está liderando actualmente la referencia interna.`
                            : `${teamData.drivers[1]} está sosteniendo mejor el nivel competitivo del equipo.`}
                    </div>
                </div>
            `;
        }

        function renderFavoritoInsightsCard(favorite) {
            const insights = getFavoriteInsights(favorite, getSelectedRace());

            return `
                <div class="card">
                    <div class="card-title">Lectura rápida</div>
                    <div class="card-sub">Tres ideas útiles para entender el favorito sin perderse en demasiados datos.</div>

                    <div class="insight-list">
                        ${insights.map(item => `<div class="insight-item">${item}</div>`).join("")}
                    </div>
                </div>
            `;
        }

        function showFavorito() {
            setActiveNav("nav-favorito");
            updateSubtitle();

            const favorite = getFavorite();
            const teamName = favorite.type === "driver" ? favorite.team : favorite.name;
            const accent = favorite.colorClass;
            const teamData = getTeamData(teamName);

            document.getElementById("content").innerHTML = `
                ${renderFavoriteCard()}
                ${renderFavoritoTechnicalCard(favorite, teamName, teamData, accent)}
                ${renderFavoritoTrendCard(favorite, teamName)}
                ${renderFavoritoComparisonCard(favorite, teamName, teamData, accent)}
                ${renderFavoritoInsightsCard(favorite)}
            `;
        }

        async function showNews() {
            setActiveNav("nav-news");
            updateSubtitle();

            const favorite = getFavorite();

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <div class="card-title" style="color: var(--${favorite.colorClass});">NOTICIAS · ${favorite.name.toUpperCase()}</div>
                    <div class="card-sub">Buscando noticias reales…</div>
                </div>
            `;

            try {
                const data = await fetchNewsDataForFavorite(favorite, true);
                const items = Array.isArray(data.items) ? data.items.slice(0, 8) : [];

                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title" style="color: var(--${favorite.colorClass});">NOTICIAS · ${favorite.name.toUpperCase()}</div>
                        <div class="card-sub">Noticias reales adaptadas al favorito actual</div>

                        ${items.length ? items.map(item => `
                            <div class="news-item">
                                <a class="news-link" href="${item.link}" target="_blank" rel="noopener noreferrer">
                                    ${item.title}
                                </a>
                                <div class="news-source">
                                    ${item.source || "Noticias"}${formatNewsDate(item.pubDate) ? ` · ${formatNewsDate(item.pubDate)}` : ""}
                                </div>
                            </div>
                        `).join("") : `
                            <div class="news-item">
                                <div>No se han encontrado noticias ahora mismo.</div>
                                <div class="news-source">Prueba otra vez dentro de un momento</div>
                            </div>
                        `}
                    </div>
                `;
            } catch (error) {
                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title" style="color: var(--${favorite.colorClass});">NOTICIAS · ${favorite.name.toUpperCase()}</div>
                        <div class="card-sub">Error al cargar noticias</div>
                        <pre class="ai-output">${error.message}</pre>
                    </div>
                `;
            }
        }

        function showMore() {
            setActiveNav("nav-more");
            updateSubtitle();

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <div class="card-title">MÁS</div>
                    <a href="#" class="menu-link" onclick="showStandings(); return false;">Clasificación</a>
                    <a href="#" class="menu-link" onclick="showCalendar(); return false;">Calendario</a>
                </div>
            `;
        }

        async function showStandings() {
            setActiveNav("nav-more");
            updateSubtitle();

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <div class="card-title">Clasificación</div>
                    <div class="card-sub">Cargando clasificación real…</div>
                </div>
            `;

            try {
                await fetchStandingsData(true);

                document.getElementById("content").innerHTML = `
                    ${renderFavoriteCard()}

                    <div class="card">
                        <div class="card-title">Clasificación</div>
                        <div class="standings-toggle">
                            <button class="toggle-btn active" id="driversBtn" onclick="showDriversStandings()">Pilotos</button>
                            <button class="toggle-btn" id="teamsBtn" onclick="showTeamsStandings()">Equipos</button>
                        </div>
                    </div>

                    <div id="standingsContent"></div>
                `;

                showDriversStandings();
            } catch (error) {
                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title">Clasificación</div>
                        <div class="card-sub">Error al cargar la clasificación</div>
                        <pre class="ai-output">${error.message}</pre>
                    </div>
                `;
            }
        }

        function showDriversStandings() {
            const driversBtn = document.getElementById("driversBtn");
            const teamsBtn = document.getElementById("teamsBtn");
            if (driversBtn) driversBtn.classList.add("active");
            if (teamsBtn) teamsBtn.classList.remove("active");

            const drivers = standingsCache?.drivers || [];

            document.getElementById("standingsContent").innerHTML = `
                <div class="card">
                    ${drivers.map(driver =>
                        driverRow(
                            driver.pos,
                            driver.number,
                            driver.name,
                            driver.team,
                            String(driver.points),
                            driver.colorClass,
                            driver.image
                        )
                    ).join("")}
                </div>
            `;
        }

        function showTeamsStandings() {
            const driversBtn = document.getElementById("driversBtn");
            const teamsBtn = document.getElementById("teamsBtn");
            if (driversBtn) driversBtn.classList.remove("active");
            if (teamsBtn) teamsBtn.classList.add("active");

            const teams = standingsCache?.teams || [];

            document.getElementById("standingsContent").innerHTML = `
                <div class="card">
                    ${teams.map(team =>
                        teamRow(
                            team.pos,
                            team.team,
                            team.drivers,
                            String(team.points),
                            team.colorClass
                        )
                    ).join("")}
                </div>
            `;
        }

        function isFavoriteDriver(name) {
            const favorite = getFavorite();
            return favorite.type === "driver" && favorite.name === name;
        }

        function isFavoriteTeam(team) {
            const favorite = getFavorite();
            return favorite.type === "team" && favorite.name === team;
        }

        function driverRow(pos, number, name, team, points, colorClass, image) {
            const isFav = isFavoriteDriver(name);

            return `
                <div class="standing-row">
                    <div class="row-left">
                        <div class="row-pos">${pos}</div>
                        <img class="row-avatar" src="${image}" alt="${name}" onerror="this.style.display='none'">
                        <div class="row-stripe ${colorClass}"></div>
                        <div class="row-number" style="color: var(--${colorClass});">${number}</div>
                        <div class="row-info">
                            <div class="row-name">${name}</div>
                            <div class="row-team">
                                <span>${team}</span>
                                <img class="team-logo" src="${getTeamLogo(team)}" alt="${team}" onerror="this.style.display='none'">
                            </div>
                        </div>
                    </div>
                    <div class="row-points">
                        ${points}<small>pts</small>
                        <button
                            class="fav-btn ${isFav ? 'active' : ''}"
                            onclick='setFavoriteDriver(${JSON.stringify(name)}, ${JSON.stringify(team)}, ${JSON.stringify(number)}, ${JSON.stringify(points)}, ${JSON.stringify(colorClass)}, ${JSON.stringify(image)}, ${JSON.stringify(pos)})'
                        >★</button>
                    </div>
                </div>
            `;
        }

        function getTeamLogo(team) {
            if (team.includes("Aston")) return "assets/logos/aston.png";
            if (team.includes("Mercedes")) return "assets/logos/mercedes.png";
            if (team.includes("Ferrari")) return "assets/logos/ferrari.png";
            if (team.includes("McLaren")) return "assets/logos/mclaren.png";
            if (team.includes("Red Bull")) return "assets/logos/redbull.png";
            if (team.includes("Alpine")) return "assets/logos/alpine.png";
            if (team.includes("Williams")) return "assets/logos/williams.png";
            if (team.includes("Haas")) return "assets/logos/haas.png";
            if (team.includes("Audi")) return "assets/logos/audi.png";
            if (team.includes("Cadillac")) return "assets/logos/cadillac.png";
            if (team.includes("Racing Bulls")) return "assets/logos/racingbulls.png";
            return "";
        }

        function teamRow(pos, team, drivers, points, colorClass) {
            const isFav = isFavoriteTeam(team);

            return `
                <div class="standing-row">
                    <div class="row-left">
                        <div class="row-pos">${pos}</div>
                        <div class="row-stripe ${colorClass}"></div>
                        <div class="row-info">
                            <div class="row-name" style="color: var(--${colorClass});">${team}</div>
                            <div class="row-team">
                                <span>${drivers}</span>
                                <img class="team-logo" src="${getTeamLogo(team)}" alt="${team}" onerror="this.style.display='none'">
                            </div>
                        </div>
                    </div>
                    <div class="row-points">
                        ${points}<small>pts</small>
                        <button
                            class="fav-btn ${isFav ? 'active' : ''}"
                            onclick='setFavoriteTeam(${JSON.stringify(team)}, ${JSON.stringify(drivers)}, ${JSON.stringify(points)}, ${JSON.stringify(colorClass)}, ${JSON.stringify(pos)})'
                        >★</button>
                    </div>
                </div>
            `;
        }

        function setFavoriteDriver(name, team, number, points, colorClass, image, pos) {
            saveFavorite({
                type: "driver",
                name,
                team,
                number,
                points,
                colorClass,
                image,
                pos
            });

            const wasTeams = document.getElementById("teamsBtn")?.classList.contains("active");
            showStandings();
            if (wasTeams) {
                setTimeout(showTeamsStandings, 50);
            }
        }

        function setFavoriteTeam(name, drivers, points, colorClass, pos) {
            saveFavorite({
                type: "team",
                name,
                drivers,
                points,
                colorClass,
                pos
            });

            const wasTeams = document.getElementById("teamsBtn")?.classList.contains("active");
            showStandings();
            if (wasTeams) {
                setTimeout(showTeamsStandings, 50);
            }
        }

        async function showCalendar() {
            setActiveNav("nav-more");
            updateSubtitle();

            document.getElementById("content").innerHTML = `
                <div class="card">
                    <div class="card-title">Calendario</div>
                    <div class="card-sub">Cargando calendario oficial 2026…</div>
                </div>
            `;

            try {
                const data = await fetchCalendarData(true);
                const events = Array.isArray(data.events) ? data.events : [];

                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title">Calendario</div>
                        <div class="card-sub">Temporada 2026 · calendario real</div>

                        ${events.map(event => `
                            <div class="list-line">
                                <div class="list-left">
                                    ${event.type === "race"
                                        ? `R${event.round} · ${event.venue}`
                                        : `${event.title}`}
                                </div>
                                <div class="list-right">
                                    ${getCalendarStatusLabel(event.status, event.type)} · ${formatCalendarDateRange(event.start, event.end)}
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            } catch (error) {
                document.getElementById("content").innerHTML = `
                    <div class="card">
                        <div class="card-title">Calendario</div>
                        <div class="card-sub">Error al cargar el calendario</div>
                        <pre class="ai-output">${error.message}</pre>
                    </div>
                `;
            }
        }

        updateSubtitle();
        fetchStandingsData().catch(() => {});
        fetchCalendarData().catch(() => {});
        showHome();
    </script>
</body>
</html>
