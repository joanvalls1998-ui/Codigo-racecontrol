<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --panel-2: #151515;
            --text: #ffffff;
            --muted: #8e8e93;
            --line: #262626;

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #1e3a8a;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #aaaaaa;
            --cadillac: #c6a300;
            --haas: #999999;
            --rb: #2a6aff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            padding: 22px 18px 14px 18px;
            border-bottom: 1px solid #111;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .container {
            padding: 16px;
            padding-bottom: 110px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, #141414, #101010);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #1f1f1f;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .stat {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat span {
            float: right;
            color: var(--muted);
        }

        .bar {
            height: 10px;
            background: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
        }

        .aston { background: var(--aston); }
        .mercedes { background: var(--mercedes); }
        .ferrari { background: var(--ferrari); }
        .mclaren { background: var(--mclaren); }
        .redbull { background: var(--redbull); }
        .alpine { background: var(--alpine); }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 22px 0;
            border-top: 1px solid #1f1f1f;
        }

        .nav a {
            color: #7a7a7a;
            text-decoration: none;
            font-size: 12px;
        }

        .nav a.active {
            color: white;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #e10600, #ff3b30);
            color: white;
            font-size: 15px;
            font-weight: 800;
            margin-top: 12px;
        }

        .standing-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #262626;
        }

        .standing-row:last-child {
            border-bottom: none;
        }

        .favorite-card {
            background: linear-gradient(135deg, rgba(0,210,190,0.18), rgba(255,255,255,0.04));
            border: 1px solid rgba(0,210,190,0.25);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">F1 · Alonso · Aston Martin</div>
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" id="nav-home" onclick="showHome()">Home</a>
    <a href="#" id="nav-predict" onclick="showPredict()">Predict</a>
    <a href="#" id="nav-aston" onclick="showAston()">Aston</a>
    <a href="#" id="nav-news" onclick="showNews()">News</a>
    <a href="#" id="nav-more" onclick="showMore()">More</a>
</div>

<script>
function setActiveNav(tab) {
    document.querySelectorAll(".nav a").forEach(el => el.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

function showHome() {
    setActiveNav("nav-home");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="card-title" style="color:#00d2be;">ALONSO STATUS</div>
            <div class="stat">Championship position <span>P22</span></div>
            <div class="stat">Points <span>0</span></div>
            <div class="stat">Last race <span>DNF</span></div>
        </div>

        <div class="card">
            <div class="card-title">TEAM HIERARCHY</div>
            <div class="stat">Mercedes <span>92%</span></div>
            <div class="bar"><div class="bar-fill mercedes" style="width:92%"></div></div>
            <div class="stat">Ferrari <span>88%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:88%"></div></div>
            <div class="stat">McLaren <span>84%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:84%"></div></div>
            <div class="stat">Aston Martin <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%"></div></div>
        </div>
    `;
}

function showPredict() {
    setActiveNav("nav-predict");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="card-title">PREDICT</div>
            <button class="btn">Generar predicción</button>
        </div>
    `;
}

function showAston() {
    setActiveNav("nav-aston");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="card-title" style="color:#00d2be;">ASTON MARTIN</div>
            <div class="stat">Race pace <span>72%</span></div>
            <div class="bar"><div class="bar-fill aston" style="width:72%"></div></div>
            <div class="stat">Reliability <span>61%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:61%"></div></div>
        </div>
    `;
}

function showNews() {
    setActiveNav("nav-news");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="card-title">NEWS</div>
            <p>Aston Martin trabajando en mejoras de fiabilidad.</p>
            <p>Mercedes domina el inicio de temporada.</p>
        </div>
    `;
}

function showMore() {
    setActiveNav("nav-more");
    document.getElementById("content").innerHTML = `
        <div class="card favorite-card">
            <div class="card-title">Fernando Alonso · Favorito</div>
            <p>Posición: P22</p>
            <p>Puntos: 0</p>
        </div>

        <div class="card">
            <div class="card-title">Standings Top 10</div>
            <div class="standing-row"><span>1. Antonelli</span><span>72</span></div>
            <div class="standing-row"><span>2. Russell</span><span>63</span></div>
            <div class="standing-row"><span>3. Leclerc</span><span>49</span></div>
            <div class="standing-row"><span>4. Hamilton</span><span>41</span></div>
            <div class="standing-row"><span>5. Norris</span><span>25</span></div>
            <div class="standing-row"><span>6. Piastri</span><span>21</span></div>
            <div class="standing-row"><span>7. Bearman</span><span>17</span></div>
            <div class="standing-row"><span>8. Gasly</span><span>15</span></div>
            <div class="standing-row"><span>9. Verstappen</span><span>12</span></div>
            <div class="standing-row"><span>10. Lawson</span><span>10</span></div>
        </div>
    `;
}

showHome();
</script>

</body>
</html>
