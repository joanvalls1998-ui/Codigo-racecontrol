<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #060606;
            --panel: #121212;
            --text: #f5f5f5;
            --muted: #a0a0a0;
            --accent: #e10600;
            --accent-soft: #ff3b30;
            --line: #262626;
            --green: #0f9d58;
            --green-soft: #8de1b1;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a1a 0%, #0b0b0b 35%, #060606 100%);
            color: var(--text);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
            padding: 18px 20px 16px;
            border-bottom: 1px solid rgba(225, 6, 0, 0.35);
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 13px;
            color: var(--muted);
        }

        .container {
            padding: 18px 16px 100px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, rgba(28,28,28,0.96) 0%, rgba(18,18,18,0.96) 100%);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 18px;
            box-shadow:
                0 10px 24px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--accent-soft);
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .card p {
            margin: 6px 0;
            color: var(--text);
            line-height: 1.45;
            font-size: 15px;
        }

        .small {
            font-size: 13px;
            color: var(--muted);
        }

        .highlight {
            color: white;
            font-weight: 700;
        }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.96);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 14px 8px calc(14px + env(safe-area-inset-bottom));
            border-top: 1px solid rgba(225, 6, 0, 0.35);
            box-shadow: 0 -8px 20px rgba(0,0,0,0.25);
        }

        .nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 10px;
            border-radius: 10px;
            transition: 0.2s ease;
        }

        .nav a:hover,
        .nav a:active {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 12px;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        th {
            color: var(--accent-soft);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td {
            color: #f0f0f0;
        }

        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(225, 6, 0, 0.12);
            color: #ff8a84;
            border: 1px solid rgba(225, 6, 0, 0.2);
        }

        .pill-green {
            background: rgba(15, 157, 88, 0.12);
            color: var(--green-soft);
            border: 1px solid rgba(15, 157, 88, 0.25);
        }

        .section-title {
            margin: 4px 0 12px;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .sim-grid {
            display: grid;
            gap: 10px;
        }

        .sim-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        .sim-line:last-child {
            border-bottom: none;
        }

        .status-good { color: var(--green-soft); font-weight: 700; }
        .status-mid { color: #ffd166; font-weight: 700; }
        .status-bad { color: #ff8a84; font-weight: 700; }
    </style>
</head>

<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">Fórmula 1 · Datos · Simulación · Noticias · Aston Martin</div>
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" onclick="showHome(); return false;">Home</a>
    <a href="#" onclick="showStandings(); return false;">Standings</a>
    <a href="#" onclick="showCalendar(); return false;">Calendar</a>
    <a href="#" onclick="showSim(); return false;">Sim</a>
    <a href="#" onclick="showAston(); return false;">Aston</a>
</div>

<script>
function showHome() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="pill">Resumen F1</div>
            <div class="section-title">Inicio de temporada 2026</div>
            <p><span class="highlight">Mercedes</span> domina el arranque del campeonato y <span class="highlight">Antonelli</span> llega como referencia tras Japón.</p>
        </div>

        <div class="card">
            <h3>Última carrera</h3>
            <p>Japanese Grand Prix</p>
            <p><span class="highlight">Ganador:</span> Kimi Antonelli</p>
            <p class="small">Suzuka confirmó el gran momento de Mercedes.</p>
        </div>

        <div class="card">
            <h3>Próxima carrera</h3>
            <p>Miami Grand Prix</p>
            <p class="small">Siguiente cita del calendario 2026.</p>
        </div>

        <div class="card">
            <h3>Noticias</h3>
            <p>Mercedes domina el inicio de temporada 2026.</p>
            <p>Aston Martin sigue con problemas de fiabilidad.</p>
            <p>Ferrari se mantiene como segunda fuerza del campeonato.</p>
        </div>
    `;
}

function showStandings() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Drivers Standings</h3>
            <table>
                <tr><th>Pos</th><th>Piloto</th><th>Equipo</th><th>Puntos</th></tr>
                <tr><td>1</td><td>Kimi Antonelli</td><td>Mercedes</td><td>72</td></tr>
                <tr><td>2</td><td>George Russell</td><td>Mercedes</td><td>63</td></tr>
                <tr><td>3</td><td>Charles Leclerc</td><td>Ferrari</td><td>49</td></tr>
                <tr><td>4</td><td>Lewis Hamilton</td><td>Ferrari</td><td>41</td></tr>
                <tr><td>5</td><td>Lando Norris</td><td>McLaren</td><td>25</td></tr>
                <tr><td>6</td><td>Oscar Piastri</td><td>McLaren</td><td>21</td></tr>
                <tr><td>7</td><td>Oliver Bearman</td><td>Haas</td><td>17</td></tr>
                <tr><td>8</td><td>Pierre Gasly</td><td>Alpine</td><td>15</td></tr>
                <tr><td>9</td><td>Max Verstappen</td><td>Red Bull</td><td>12</td></tr>
                <tr><td>10</td><td>Liam Lawson</td><td>Racing Bulls</td><td>10</td></tr>
                <tr><td>11</td><td>Arvid Lindblad</td><td>Racing Bulls</td><td>4</td></tr>
                <tr><td>12</td><td>Isack Hadjar</td><td>Red Bull</td><td>4</td></tr>
                <tr><td>13</td><td>Gabriel Bortoleto</td><td>Audi</td><td>2</td></tr>
                <tr><td>14</td><td>Carlos Sainz</td><td>Williams</td><td>2</td></tr>
                <tr><td>15</td><td>Esteban Ocon</td><td>Haas</td><td>1</td></tr>
                <tr><td>16</td><td>Franco Colapinto</td><td>Alpine</td><td>1</td></tr>
                <tr><td>17</td><td>Nico Hülkenberg</td><td>Audi</td><td>0</td></tr>
                <tr><td>18</td><td>Alexander Albon</td><td>Williams</td><td>0</td></tr>
                <tr><td>19</td><td>Valtteri Bottas</td><td>Cadillac</td><td>0</td></tr>
                <tr><td>20</td><td>Sergio Pérez</td><td>Cadillac</td><td>0</td></tr>
                <tr><td>21</td><td>Lance Stroll</td><td>Aston Martin</td><td>0</td></tr>
                <tr><td>22</td><td>Fernando Alonso</td><td>Aston Martin</td><td>0</td></tr>
            </table>
        </div>

        <div class="card">
            <h3>Constructors Standings</h3>
            <table>
                <tr><th>Pos</th><th>Equipo</th><th>Puntos</th></tr>
                <tr><td>1</td><td>Mercedes</td><td>135</td></tr>
                <tr><td>2</td><td>Ferrari</td><td>90</td></tr>
                <tr><td>3</td><td>McLaren</td><td>46</td></tr>
                <tr><td>4</td><td>Haas</td><td>18</td></tr>
                <tr><td>5</td><td>Red Bull</td><td>16</td></tr>
                <tr><td>6</td><td>Alpine</td><td>16</td></tr>
                <tr><td>7</td><td>Racing Bulls</td><td>14</td></tr>
                <tr><td>8</td><td>Audi</td><td>2</td></tr>
                <tr><td>9</td><td>Williams</td><td>2</td></tr>
                <tr><td>10</td><td>Cadillac</td><td>0</td></tr>
                <tr><td>11</td><td>Aston Martin</td><td>0</td></tr>
            </table>
        </div>
    `;
}

function showCalendar() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h3>Calendario</h3>
            <p>Australia — Completado</p>
            <p>China — Completado</p>
            <p>Japón — Completado</p>
            <p>Miami — Próximo</p>
            <p>Canadá — Próximo</p>
            <p>Mónaco — Próximo</p>
        </div>
    `;
}

function showSim() {
    let drivers = [
        {name:"Antonelli", team:"Mercedes", pace:1.00},
        {name:"Russell", team:"Mercedes", pace:1.00},
        {name:"Leclerc", team:"Ferrari", pace:1.03},
        {name:"Hamilton", team:"Ferrari", pace:1.03},
        {name:"Norris", team:"McLaren", pace:1.05},
        {name:"Piastri", team:"McLaren", pace:1.05},
        {name:"Verstappen", team:"Red Bull", pace:1.06},
        {name:"Hadjar", team:"Red Bull", pace:1.06},
        {name:"Gasly", team:"Alpine", pace:1.08},
        {name:"Colapinto", team:"Alpine", pace:1.08},
        {name:"Bearman", team:"Haas", pace:1.09},
        {name:"Ocon", team:"Haas", pace:1.09},
        {name:"Lawson", team:"Racing Bulls", pace:1.09},
        {name:"Lindblad", team:"Racing Bulls", pace:1.09},
        {name:"Alonso", team:"Aston Martin", pace:1.10},
        {name:"Stroll", team:"Aston Martin", pace:1.11},
        {name:"Albon", team:"Williams", pace:1.11},
        {name:"Sainz", team:"Williams", pace:1.11},
        {name:"Bortoleto", team:"Audi", pace:1.12},
        {name:"Hulkenberg", team:"Audi", pace:1.12},
        {name:"Perez", team:"Cadillac", pace:1.13},
        {name:"Bottas", team:"Cadillac", pace:1.13}
    ];

    drivers.forEach(d => {
        d.qualy = d.pace + Math.random() * 0.05;
    });

    let qualyOrder = [...drivers].sort((a,b) => a.qualy - b.qualy);

    drivers.forEach(d => {
        let pitLoss = 0.02;
        let raceVariance = Math.random() * 0.06;
        d.raceTime = d.pace + raceVariance + pitLoss;
    });

    let raceOrder = [...drivers].sort((a,b) => a.raceTime - b.raceTime);

    let rain = Math.random() < 0.25 ? "Sí" : "No";
    let safetyCar = Math.random() < 0.45 ? "Sí" : "No";
    let dnf = Math.random() < 0.20 ? "Sí" : "No";
    let alonsoPos = raceOrder.findIndex(d => d.name === "Alonso") + 1;
    let leaderGap = (raceOrder[alonsoPos - 1].raceTime - raceOrder[0].raceTime).toFixed(2);

    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="pill">Simulación</div>
            <div class="section-title">GP de Japón · Suzuka</div>
            <p><span class="highlight">Clima:</span> ${rain === "Sí" ? "Lluvia" : "Seco"}</p>
            <p><span class="highlight">Safety Car:</span> ${safetyCar}</p>
            <p><span class="highlight">DNF probable:</span> ${dnf}</p>
        </div>

        <div class="card">
            <h3>Clasificación (Qualy)</h3>
            <div class="sim-grid">
                <div class="sim-line"><span>P1</span><span>${qualyOrder[0].name}</span></div>
                <div class="sim-line"><span>P2</span><span>${qualyOrder[1].name}</span></div>
                <div class="sim-line"><span>P3</span><span>${qualyOrder[2].name}</span></div>
                <div class="sim-line"><span>P4</span><span>${qualyOrder[3].name}</span></div>
                <div class="sim-line"><span>P5</span><span>${qualyOrder[4].name}</span></div>
            </div>
        </div>

        <div class="card">
            <h3>Resultado Carrera</h3>
            <div class="sim-grid">
                <div class="sim-line"><span>1</span><span>${raceOrder[0].name}</span></div>
                <div class="sim-line"><span>2</span><span>${raceOrder[1].name}</span></div>
                <div class="sim-line"><span>3</span><span>${raceOrder[2].name}</span></div>
                <div class="sim-line"><span>4</span><span>${raceOrder[3].name}</span></div>
                <div class="sim-line"><span>5</span><span>${raceOrder[4].name}</span></div>
                <div class="sim-line"><span>6</span><span>${raceOrder[5].name}</span></div>
                <div class="sim-line"><span>7</span><span>${raceOrder[6].name}</span></div>
                <div class="sim-line"><span>8</span><span>${raceOrder[7].name}</span></div>
                <div class="sim-line"><span>9</span><span>${raceOrder[8].name}</span></div>
                <div class="sim-line"><span>10</span><span>${raceOrder[9].name}</span></div>
            </div>
        </div>

        <div class="card">
            <h3>Fernando Alonso</h3>
            <p><span class="highlight">Posición final:</span> P${alonsoPos}</p>
            <p><span class="highlight">Estrategia:</span> Medium → Hard</p>
            <p><span class="highlight">Pit Stop:</span> Vuelta 18</p>
            <p><span class="highlight">Ritmo carrera:</span> +${leaderGap}s</p>
        </div>
    `;
}

function showAston() {
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="pill pill-green">Aston Martin</div>
            <div class="section-title">Estado del equipo</div>
            <p><span class="highlight">Fiabilidad:</span> <span class="status-bad">Baja</span></p>
            <p><span class="highlight">Ritmo:</span> <span class="status-mid">Medio-bajo</span></p>
            <p><span class="highlight">Motor Honda:</span> con problemas</p>
        </div>

        <div class="card">
            <h3>Fernando Alonso</h3>
            <p><span class="highlight">Puntos:</span> 0</p>
            <p><span class="highlight">Últimas carreras:</span> DNF / DNF / fuera de puntos</p>
            <p><span class="highlight">Probabilidad de puntos:</span> Baja</p>
            <p><span class="highlight">Probabilidad de DNF:</span> Media</p>
        </div>

        <div class="card">
            <h3>Lance Stroll</h3>
            <p><span class="highlight">Puntos:</span> 0</p>
            <p><span class="highlight">Últimas carreras:</span> DNF / DNF / fuera de puntos</p>
            <p><span class="highlight">Probabilidad de puntos:</span> Baja</p>
            <p><span class="highlight">Probabilidad de DNF:</span> Media</p>
        </div>

        <div class="card">
            <h3>Próxima carrera</h3>
            <p>Miami Grand Prix</p>
            <p><span class="highlight">Objetivo Aston Martin:</span> terminar con ambos coches</p>
        </div>
    `;
}

showHome();
</script>

</body>
</html>
