<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>RaceControl</title>
  <meta name="theme-color" content="#07111a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RaceControl" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css?v=13" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-shell">
        <div class="title">RaceControl</div>
        <div class="subtitle" id="appSubtitle">F1 · Alonso · Aston Martin</div>
      </div>
    </div>

    <div class="container" id="content"></div>

    <div class="nav">
      <a href="#" id="nav-home" onclick="showHome(); return false;">Inicio</a>
      <a href="#" id="nav-predict" onclick="showPredict(); return false;">Predicción</a>
      <a href="#" id="nav-favorito" onclick="showFavorito(); return false;">Favorito</a>
      <a href="#" id="nav-news" onclick="showNews(); return false;">Noticias</a>
      <a href="#" id="nav-more" onclick="showMore(); return false;">Más</a>
    </div>
  </div>

  <div class="modal" id="detailModal" onclick="closeDetailModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-close-row">
        <button class="modal-close" onclick="closeDetailModal()">×</button>
      </div>
      <div id="detailModalContent"></div>
    </div>
  </div>

  <script src="/app.js?v=13"></script>
</body>
</html>
