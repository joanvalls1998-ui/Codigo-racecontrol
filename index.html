<!DOCTYPE html>
<html lang="es">
<head>
    <title>RaceControl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --panel-2: #151515;
            --text: #ffffff;
            --muted: #8e8e93;
            --line: #262626;

            --aston: #00d2be;
            --mercedes: #00aaff;
            --ferrari: #ff3b30;
            --mclaren: #ff8700;
            --redbull: #1e3a8a;
            --alpine: #4cc9f0;
            --williams: #3a86ff;
            --audi: #aaaaaa;
            --cadillac: #c6a300;
            --haas: #999999;
            --rb: #2a6aff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .header {
            padding: 22px 18px 14px 18px;
            border-bottom: 1px solid #111;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .container {
            padding: 16px;
            padding-bottom: 110px;
            max-width: 760px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(180deg, #141414, #101010);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid #1f1f1f;
        }

        .card-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
        }

        .card-sub {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .stat {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat span {
            float: right;
            color: var(--muted);
        }

        .bar {
            height: 10px;
            background: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
        }

        .aston { background: var(--aston); }
        .mercedes { background: var(--mercedes); }
        .ferrari { background: var(--ferrari); }
        .mclaren { background: var(--mclaren); }
        .redbull { background: var(--redbull); }
        .alpine { background: var(--alpine); }
        .williams { background: var(--williams); }
        .audi { background: var(--audi); }
        .cadillac { background: var(--cadillac); }
        .haas { background: var(--haas); }
        .rb { background: var(--rb); }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 22px 0;
            border-top: 1px solid #1f1f1f;
        }

        .nav a {
            color: #7a7a7a;
            text-decoration: none;
            font-size: 12px;
            text-align: center;
        }

        .nav a.active {
            color: white;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            background: linear-gradient(90deg, #e10600, #ff3b30);
            color: white;
            font-size: 15px;
            font-weight: 800;
            margin-top: 12px;
        }

        .news-item {
            padding: 10px 0;
            border-bottom: 1px solid #262626;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-source {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .menu-link {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid var(--line);
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .menu-link:last-child {
            border-bottom: none;
        }

        pre.ai-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        .favorite-card {
            background: linear-gradient(135deg, rgba(0,210,190,0.18), rgba(255,255,255,0.04));
            border: 1px solid rgba(0,210,190,0.25);
        }

        .favorite-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .favorite-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .favorite-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-stripe {
            width: 6px;
            height: 54px;
            border-radius: 10px;
            background: var(--aston);
        }

        .driver-number {
            font-size: 34px;
            font-weight: 800;
            line-height: 1;
            min-width: 42px;
        }

        .favorite-name {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.1;
        }

        .favorite-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .favorite-points {
            text-align: right;
        }

        .favorite-points-value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
        }

        .favorite-points-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .standings-toggle {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #151515;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .toggle-btn.active {
            background: linear-gradient(180deg, #2a2a2a, #1b1b1b);
            border-color: #3a3a3a;
        }

        .standing-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }

        .standing-row:last-child {
            border-bottom: none;
        }

        .row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .row-pos {
            width: 22px;
            font-size: 13px;
            color: var(--muted);
        }

        .row-stripe {
            width: 4px;
            height: 44px;
            border-radius: 8px;
        }

        .row-number {
            font-size: 24px;
            font-weight: 800;
            width: 34px;
            text-align: center;
            line-height: 1;
        }

        .row-info {
            min-width: 0;
        }

        .row-name {
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-team {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .row-points {
            font-size: 18px;
            font-weight: 800;
            white-space: nowrap;
        }

        .row-points small {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            text-align: right;
            margin-top: 3px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="title">RaceControl</div>
    <div class="subtitle">F1 · Alonso · Aston Martin</div>
</div>

<div class="container" id="content"></div>

<div class="nav">
    <a href="#" id="nav-home" onclick="showHome(); return false;">Home</a>
    <a href="#" id="nav-predict" onclick="showPredict(); return false;">Predict</a>
    <a href="#" id="nav-aston" onclick="showAston(); return false;">Aston</a>
    <a href="#" id="nav-news" onclick="showNews(); return false;">News</a>
    <a href="#" id="nav-more" onclick="showMore(); return false;">More</a>
</div>

<script>
function setActiveNav(tabId) {
    const ids = ["nav-home", "nav-predict", "nav-aston", "nav-news", "nav-more"];
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
    });
    const active = document.getElementById(tabId);
    if (active) active.classList.add("active");
}

function showHome() {

            <div class="bar"><div class="bar-fill aston" style="width:32%;"></div></div>

            <div class="stat" style="margin-top:12px;">DNF risk <span>28%</span></div>
            <div class="bar"><div class="bar-fill ferrari" style="width:28%;"></div></div>
        </div>

        <div class="card">
            <div class="card-title" style="color: var(--aston);">ASTON MARTIN STATUS</div>

            <div class="bar"><div class="bar-fill mclaren" style="width:61%;"></div></div>

            <div class="stat" style="margin-top:12px;">Honda PU status <span>Risk</span></div>
        </div>

        <div class="card">
            <div class="card-title" style="color: var(--mclaren);">NEXT RACE · MIAMI</div>

            <div class="stat">Safety Car probability <span>42%</span></div>
            <div class="bar"><div class="bar-fill mclaren" style="width:42%;"></div></div>

            <div class="stat" style="margin-top:12px;">Rain probability <span>18%</span></div>
            <div class="bar"><div class="bar-fill alpine" style="width:18%;"></div></div>

        </div>

        <div class="card">
            <div class="card-title">WEEKEND TARGET</div>
            <div class="card-sub">Objetivo del equipo</div>

            <p>Secondary: Fight for P10 if race has incidents.</p>
            <p>Risk level: Medium–High</p>
        </div>
    `;
}

async function generatePredict() {
    const output = document.getElementById("predictResult");
    output.innerText = "Generando predicción...";

    try {
        const res = await fetch("/api/predict");
        const data = await res.json();
        output.innerText = data.result || "Error generando predicción.";
    } catch (error) {
        output.innerText = "Error de conexión con la IA.";
    }
}

function showPredict() {
    setActiveNav("nav-predict");
    document.getElementById("content").innerHTML = `
        <div class="card">
            <div class="card-title">PREDICT · IA</div>
            <div class="card-sub">Predicción automática de la próxima carrera</div>
            <button class="btn" onclick="generatePredict()">Generar predicción</button>
        </div>

        <div class="card">
            <div class="card-title">AI RESULT</div>
            <pre id="predictResult" class="ai-output">Pulsa generar.</pre>
        </div>
    `;
}

function showTeamsStandings() {
